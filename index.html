<!-- Service Worker registration -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'cycling-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  window.addEventListener('load', () => navigator.serviceWorker.register(swURL));
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function computeFitness(rides) {
  const byDate = {};
  rides.forEach(r => { byDate[r.date] = (byDate[r.date]||0) + r.tss; });
  const res = []; let ctl=40, atl=40;
  for (let d=new Date("2026-01-01"); d<=new Date("2026-07-17"); d.setDate(d.getDate()+1)) {
    const ds = d.toISOString().slice(0,10);
    const tss = byDate[ds]||0;
    ctl = ctl+(tss-ctl)/42; atl = atl+(tss-atl)/7;
    res.push({date:ds,label:ds.slice(5),ctl:Math.round(ctl*10)/10,atl:Math.round(atl*10)/10,tsb:Math.round((ctl-atl)*10)/10,tss});
  }
  return res;
}

function getZones(ftp) {
  return [
    {z:"Z1",label:"Regenerace",  min:0,              max:Math.round(ftp*.55),color:"#94a3b8"},
    {z:"Z2",label:"Aerobní",     min:Math.round(ftp*.55),max:Math.round(ftp*.75),color:"#34d399"},
    {z:"Z3",label:"Tempo",       min:Math.round(ftp*.75),max:Math.round(ftp*.90),color:"#fbbf24"},
    {z:"Z4",label:"Práh/SST",    min:Math.round(ftp*.90),max:Math.round(ftp*1.05),color:"#f97316"},
    {z:"Z5",label:"VO2max",      min:Math.round(ftp*1.05),max:Math.round(ftp*1.20),color:"#ef4444"},
    {z:"Z6",label:"Anaerobní",   min:Math.round(ftp*1.20),max:9999,color:"#a855f7"},
  ];
}

    setSaveStatus("saving");
