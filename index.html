<script>

// ── INFO TEXTS ────────────────────────────────────────────────────────────────
const INFO = {
  ctl: `<h4>CTL — Chronic Training Load (Tréninková forma)</h4>

    <span class="tag" style="background:#0c2a4a;color:#38bdf8">40–70</span> Aktivní amatér (ty teď)<br>

  atl: `<h4>ATL — Acute Training Load (Akutní únava)</h4>

  ftp: `<h4>FTP — Functional Threshold Power</h4>

// ── STRAVA OAUTH ──────────────────────────────────────────────────────────────
function stravaLogin() {
  const url=`https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=activity:read_all`;
  window.location.href=url;
}

async function handleOAuth() {
  const p=new URLSearchParams(window.location.search);
  const code=p.get("code");
  if(!code) return false;
  window.history.replaceState({},"",window.location.pathname);
  const secret=localStorage.getItem("cyc_secret");
  if(!secret){showTab("admin");return true;}
  setSyncInfo("🔄 Přihlašuji...");
  try {
    const r=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({client_id:CLIENT_ID,client_secret:secret,code,grant_type:"authorization_code"})});
    const d=await r.json();
    if(d.access_token){
      localStorage.setItem("cyc_token",d.access_token);
      localStorage.setItem("cyc_refresh",d.refresh_token);
      localStorage.setItem("cyc_token_exp",d.expires_at);
      await syncRides(d.access_token);
    } else setSyncInfo("❌ Chyba: "+(d.message||"?"));
  } catch(e){setSyncInfo("❌ "+e.message);}
  return true;
}

async function getToken() {
  const exp=parseInt(localStorage.getItem("cyc_token_exp")||"0");
  if(Math.floor(Date.now()/1000)>exp-300){
    const r=localStorage.getItem("cyc_refresh"),sec=localStorage.getItem("cyc_secret");
    if(!r||!sec) return null;
    try{
      const res=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({client_id:CLIENT_ID,client_secret:sec,refresh_token:r,grant_type:"refresh_token"})});
      const d=await res.json();
      if(d.access_token){localStorage.setItem("cyc_token",d.access_token);localStorage.setItem("cyc_token_exp",d.expires_at);return d.access_token;}
    }catch(e){}
    return null;
  }
  return localStorage.getItem("cyc_token");
}

async function syncRides(token) {
  setSyncInfo('<span style="color:#38bdf8">⏳ Stahuji jízdy...</span>');
  try {
    const cached=JSON.parse(localStorage.getItem("cyc_rides")||"[]");
    let after=0;
    if(cached.length>0){const n=cached.reduce((a,b)=>a.date>b.date?a:b);after=Math.floor(new Date(n.date).getTime()/1000)+1;}
    let page=1,newRides=[],hasMore=true;
    while(hasMore){
      let url=`https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`;
      if(after>0)url+=`&after=${after}`;
      const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
      const acts=await res.json();
      if(!Array.isArray(acts)||acts.length===0){hasMore=false;break;}
      acts.forEach(a=>{
        if(!["Ride","VirtualRide"].includes(a.sport_type||a.type))return;
        const w=a.average_watts||0;
        const tss=w>0&&S.ftp>0?Math.round((a.moving_time/3600)*(w/S.ftp)*(w/S.ftp)*100):Math.round(a.suffer_score||30);
        newRides.push({id:String(a.id),name:a.name,date:(a.start_date_local||"").slice(0,10),
          type:a.sport_type||a.type,tss,watts:Math.round(w),hr:Math.round(a.average_heartrate||0),
          dur:a.moving_time||0,km:Math.round((a.distance||0)/100)/10,
          elev:Math.round(a.total_elevation_gain||0),kcal:a.calories||0,prs:a.pr_count||0});
      });
      if(acts.length<100)hasMore=false;
      page++;
    }
    const ids=new Set(cached.map(r=>r.id));
    RIDES=[...newRides.filter(r=>!ids.has(r.id)),...cached];
    RIDES.sort((a,b)=>b.date.localeCompare(a.date));
    localStorage.setItem("cyc_rides",JSON.stringify(RIDES));
    const ts=new Date().toLocaleString("cs-CZ",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    localStorage.setItem("cyc_last_sync",ts);
    recompute();updateHeader();showTab(currentTab);
    const n=newRides.filter(r=>!ids.has(r.id)).length;
    setSyncInfo(`✅ ${n} nových · celkem ${RIDES.length}`);
  }catch(e){setSyncInfo("❌ "+e.message);}
}

function setSyncInfo(msg){const el=document.getElementById("sync-info");if(el)el.innerHTML=msg;}

// ── POWER CURVE (skutečná data ze Strava streamů, ne odhad) ────────────────────
const PC_DURATIONS=[{k:"5",l:"5s"},{k:"60",l:"1min"},{k:"300",l:"5min"},{k:"1200",l:"20min"},{k:"3600",l:"1h"},{k:"7200",l:"2h"},{k:"10800",l:"3h"}];
function pcCache(){try{return JSON.parse(localStorage.getItem("cyc_pc_cache")||"{}");}catch(e){return {};}}
function savePcCache(c){localStorage.setItem("cyc_pc_cache",JSON.stringify(c));}
function maxAvgWindow(arr,n){
  if(!arr||!arr.length)return 0;
  if(n<1)n=1;
  if(n>=arr.length){let s=0;for(const v of arr)s+=v;return s/arr.length;}
  let sum=0;for(let i=0;i<n;i++)sum+=arr[i];
  let max=sum;
  for(let i=n;i<arr.length;i++){sum+=arr[i]-arr[i-n];if(sum>max)max=sum;}
  return max/n;
}
async function fetchActivityBest(token,ride){
  const url=`https://www.strava.com/api/v3/activities/${ride.id}/streams?keys=watts,time&key_by_type=true&resolution=high`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(res.status===429){const err=new Error("rate_limited");err.rateLimited=true;throw err;}
  if(!res.ok)return null;
  const d=await res.json();
  const w=d.watts&&d.watts.data,t=d.time&&d.time.data;
  if(!w||!w.length)return null;
  let dt=1;
  if(t&&t.length>1)dt=(t[t.length-1]-t[0])/(t.length-1)||1;
  const best={date:ride.date};
  PC_DURATIONS.forEach(pd=>{best[pd.k]=Math.round(maxAvgWindow(w,Math.max(1,Math.round(Number(pd.k)/dt))));});
  return best;
}
let _pcRunning=false;
async function updatePowerCurve(limit){
  if(_pcRunning)return;
  _pcRunning=true;
  const statusEl=()=>document.getElementById("pc-status");
  const token=await getToken();
  if(!token){_pcRunning=false;alert("Nejdřív se přihlas přes Strava v záložce Admin.");return;}
  // nejdřív stáhni, co už spočítalo jiné zařízení, ať tu práci neděláme znovu
  if(S.workerUrl){const el=statusEl();if(el)el.textContent="☁️ Kontroluji, co už je spočtené jinde…";await syncFromCloud(true);}
  const cache=pcCache();
  const todo=RIDES.filter(r=>r.watts>0&&!cache[r.id]).slice(0,limit||20);
  let done=0,rateLimited=false;
  for(const r of todo){
    try{
      const best=await fetchActivityBest(token,r);
      if(best)cache[r.id]=best;
      done++;
      savePcCache(cache);
      const el=statusEl();if(el)el.textContent=`Zpracovávám power curve… ${done}/${todo.length}`;
    }catch(e){if(e&&e.rateLimited){rateLimited=true;break;}}
  }
  // ulož spočtené i jen částečně dokončené do cloudu, ať to na dalším zařízení nemusíš počítat znovu
  if(S.workerUrl)await syncToCloud();
  _pcRunning=false;
  if(currentTab==="power")showTab("power");
  if(rateLimited)alert("Strava API dočasně omezilo počet požadavků. Zkus 'Načíst další jízdy' za pár minut.");
}
function aggregatePowerCurve(){
  const cache=pcCache();
  const now=new Date();
  const d42=new Date(now);d42.setDate(d42.getDate()-42);
  const seasonStart=new Date(now.getFullYear(),0,1);
  const rows=PC_DURATIONS.map(pd=>({l:pd.l,k:pd.k,d42:0,season:0}));
  Object.values(cache).forEach(entry=>{
    if(!entry||!entry.date)return;
    const dt=new Date(entry.date);
    rows.forEach(row=>{
      const v=entry[row.k]||0;
      if(dt>=d42&&v>row.d42)row.d42=v;
      if(dt>=seasonStart&&v>row.season)row.season=v;
    });
  });
  return rows;
}
function renderPowerCurveTable(){

    ${infoBox("power")}
    ${hasAny?`

      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr style="border-top:1px solid #334155">
          <td style="padding:5px 6px;color:#94a3b8">${r.l}</td>
          <td style="padding:5px 6px;text-align:right;font-weight:700">${r.d42?r.d42+"W":"–"}</td>
          <td style="padding:5px 6px;text-align:right;color:#64748b">${r.d42?(r.d42/wkg).toFixed(2):"–"}</td>

    <div id="pc-status" style="font-size:11px;color:#64748b;margin-top:8px">${cachedCount<totalEligible?`Spočteno ${cachedCount} z ${totalEligible} jízd s výkonem.`:"Všechny jízdy s výkonem zpracovány."}</div>
    ${cachedCount<totalEligible?`<button class="btn" style="width:100%;margin-top:8px;background:#1e40af" onclick="updatePowerCurve(20)">${cachedCount===0?"⚡ Spočítat power curve":"🔄 Načíst další jízdy (+20)"}</button>`:""}

// ── FITNESS CALC ──────────────────────────────────────────────────────────────
function fmtD(iso){const p=String(iso).split("-");return p.length>=3?`${p[2]}.${p[1]}`:iso;}
function recompute(){
  if(!RIDES.length){FITNESS=[];LATEST={ctl:0,atl:0,tsb:0};return;}
  const byDate={};
  RIDES.forEach(r=>{if(r.tss)byDate[r.date]=(byDate[r.date]||0)+r.tss;});
  const start=new Date(Object.keys(byDate).sort()[0]);
  const end=new Date();
  const res=[];let ctl=20,atl=20;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().slice(0,10);
    const tss=byDate[ds]||0;
    ctl=ctl+(tss-ctl)/42;atl=atl+(tss-atl)/7;
    res.push({date:ds,label:fmtD(ds),ctl:+(ctl.toFixed(1)),atl:+(atl.toFixed(1)),tsb:+((ctl-atl).toFixed(1)),tss});
  }
  FITNESS=res;LATEST=res[res.length-1];
}

function getZones(ftp){return[
  {z:"Z1",n:"Regenerace",min:0,max:Math.round(ftp*.55),c:"#94a3b8"},
  {z:"Z2",n:"Aerobní",min:Math.round(ftp*.55),max:Math.round(ftp*.75),c:"#34d399"},
  {z:"Z3",n:"Tempo",min:Math.round(ftp*.75),max:Math.round(ftp*.90),c:"#fbbf24"},
  {z:"Z4",n:"Práh/SST",min:Math.round(ftp*.90),max:Math.round(ftp*1.05),c:"#f97316"},
  {z:"Z5",n:"VO2max",min:Math.round(ftp*1.05),max:Math.round(ftp*1.20),c:"#ef4444"},
  {z:"Z6",n:"Anaerobní",min:Math.round(ftp*1.20),max:9999,c:"#a855f7"},
];}
function getZone(w){return getZones(S.ftp).find(z=>w>=z.min&&w<z.max)||getZones(S.ftp)[0];}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
const CHART_W=340,CHART_PAD={t:10,r:8,b:26,l:32};
let _chartMeta={},_chartId=0;
const CHART_EVTS='onpointerdown="chartTip(event)" onpointermove="chartTip(event)" onpointerup="chartTip(event)" onpointerleave="hideTip()"';

function svgLine(data,keys,colors,H=160,unit="",labels=null){
  const id="c"+(_chartId++);
  _chartMeta[id]={type:"line",data,keys,colors,unit:unit||"",labels:labels||keys};
  const W=CHART_W,p=CHART_PAD;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const vals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const minV=Math.min(...vals)-3,maxV=Math.max(...vals)+3;
  const px=i=>p.l+i/(data.length-1||1)*cw;
  const py=v=>p.t+ch-(v-minV)/(maxV-minV||1)*ch;
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  const step=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{if(i%step===0)s+=`<line x1="${px(i)}" y1="${p.t}" x2="${px(i)}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;const v=Math.round(maxV-(maxV-minV)*i/3);
    s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;
    s+=`<text x="${p.l-3}" y="${y+3}" text-anchor="end" fill="#475569" font-size="9">${v}</text>`;}
  data.forEach((d,i)=>{if(i%step===0)s+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label}</text>`;});
  if(keys.includes('tsb')){const y0=py(0);s+=`<line x1="${p.l}" y1="${y0}" x2="${W-p.r}" y2="${y0}" stroke="#475569" stroke-dasharray="4" stroke-width="1"/>`;}
  keys.forEach((k,ki)=>{const pts=data.map((d,i)=>`${px(i)},${py(d[k]||0)}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="2"/>`;});
  return s+`</svg>`;
}

function svgBar(data,key,color,H=150,refVal=null,unit="",label="FTP"){
  const id="c"+(_chartId++);
  _chartMeta[id]={type:"bar",data,key,color,unit:unit||"",refVal,refLabel:label};
  const W=CHART_W,p=CHART_PAD;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const vals=data.map(d=>d[key]||0);
  const maxV=Math.max(...vals)*1.1||1;
  const bw=Math.max(6,cw/data.length-2);
  const lblStep=Math.max(1,Math.ceil(data.length/6));
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  data.forEach((d,i)=>{const cx=p.l+i*(cw/data.length)+(cw/data.length)/2;
    s+=`<line x1="${cx}" y1="${p.t}" x2="${cx}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;
    s+=`<text x="${p.l-3}" y="${y+3}" text-anchor="end" fill="#475569" font-size="9">${Math.round(maxV-maxV*i/3)}</text>`;}
  data.forEach((d,i)=>{
    const x=p.l+i*(cw/data.length)+(cw/data.length-bw)/2;
    const bh=((d[key]||0)/maxV)*ch;const y=p.t+ch-bh;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="2"/>`;
    if(i%lblStep===0)s+=`<text x="${x+bw/2}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label||d.d||""}</text>`;});
  if(refVal){const y=p.t+ch-(refVal/maxV)*ch;
    s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5"/>`;
    s+=`<text x="${W-p.r}" y="${y-3}" text-anchor="end" fill="#a78bfa" font-size="9">FTP</text>`;}
  return s+`</svg>`;
}

// ── CHART TOOLTIP (hover na PC / dotyk na mobilu) ──────────────────────────────
function chartTip(e){
  const svg=e.currentTarget;
  const meta=_chartMeta[svg.dataset.cid];
  if(!meta)return;
  if(e.pointerType==='mouse' && e.buttons===0 && e.type==='pointerdown')return;
  e.preventDefault();
  const rect=svg.getBoundingClientRect();
  const relX=(e.clientX-rect.left)/rect.width*CHART_W;
  const cw=CHART_W-CHART_PAD.l-CHART_PAD.r;
  let idx;
  if(meta.type==='line'||meta.type==='combo'){
    idx=Math.round((relX-CHART_PAD.l)/cw*(meta.data.length-1));
  }else{
    idx=Math.floor((relX-CHART_PAD.l)/(cw/meta.data.length));
  }
  idx=Math.max(0,Math.min(meta.data.length-1,idx));
  const d=meta.data[idx];
  let html;
  if(meta.type==='line'){
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||''}</div>`+
      meta.keys.map((k,i)=>`<div><span style="color:${meta.colors[i]}">●</span> ${(meta.labels[i]||k).toUpperCase()}: <b>${d[k]??0}</b>${meta.unit}</div>`).join('');
  }else if(meta.type==='combo'){
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||''}</div>`+
      (meta.metrics.length?meta.metrics.map(m=>`<div><span style="color:${m.color}">●</span> ${m.label}: <b>${Math.round(d[m.key]??0)}</b>${m.unit}</div>`).join(''):
      `<div style="color:#64748b">Zapni alespoň jednu metriku</div>`);
  }else{
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||d.d||''}</div><div><span style="color:${meta.color}">●</span> <b>${d[meta.key]??0}</b>${meta.unit}</div>`+
      (meta.refVal?`<div style="color:#a78bfa">${meta.refLabel}: <b>${meta.refVal}</b>${meta.unit}</div>`:'');
  }
  const tip=document.getElementById('chart-tooltip');
  tip.innerHTML=html;
  tip.style.display='block';
  const tw=tip.offsetWidth||120,th=tip.offsetHeight||40;
  let left=e.clientX+14,top=e.clientY-th-14;
  if(left+tw>window.innerWidth-8)left=e.clientX-tw-14;
  if(left<8)left=8;
  if(top<8)top=e.clientY+14;
  if(top+th>window.innerHeight-8)top=window.innerHeight-th-8;
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}
function hideTip(){const tip=document.getElementById('chart-tooltip');if(tip)tip.style.display='none';}
document.addEventListener('pointerdown',e=>{if(!e.target.closest('svg[data-cid]'))hideTip();});

// ── ZOOM CHARTS — přiblížení konkrétního ROZSAHU DAT (jako na intervals.icu) ───
// Dva prsty od sebe/k sobě (nebo kolečko myši) zúží/rozšíří zobrazený úsek dat;
// osa X se vždy přepočítá jen pro aktuálně vybraný rozsah bodů.
const _zoomCfg={};   // zid -> {type,fullData,keys,colors,H,unit,labels,maxPoints}
const _zoomState={}; // zid -> {start,end} indexy do fullData

function decimate(arr,maxPoints){
  if(arr.length<=maxPoints)return arr;
  const k=Math.ceil(arr.length/maxPoints);
  return arr.filter((_,i)=>i%k===0);
}
function fmtRangeLabel(cfg,start,end){
  const n=end-start+1,full=cfg.fullData.length;
  if(n>=full)return `Celé období · ${full} bodů`;
  const a=cfg.fullData[start]?.label||"",b=cfg.fullData[end]?.label||"";
  return `${a} – ${b} · ${n} bodů`;
}
function renderZoomChart(zid){
  const cfg=_zoomCfg[zid],st=_zoomState[zid];
  const shown=decimate(cfg.fullData.slice(st.start,st.end+1),cfg.maxPoints);
  const svg=cfg.type==="combo"?svgCombo(shown,cfg):svgLine(shown,cfg.keys,cfg.colors,cfg.H,cfg.unit,cfg.labels);
  const el=document.getElementById("zc-"+zid);if(el)el.innerHTML=svg;
  const rl=document.getElementById("zr-"+zid);if(rl)rl.textContent=fmtRangeLabel(cfg,st.start,st.end);
}
function zoomWrapLine(fullData,keys,colors,H,unit,labels,zid,maxPoints=90){
  _zoomCfg[zid]={type:"line",fullData,keys,colors,H,unit,labels,maxPoints};
  if(!_zoomState[zid]||_zoomState[zid].end>=fullData.length)_zoomState[zid]={start:0,end:fullData.length-1};
  const st=_zoomState[zid];
  const svg=svgLine(decimate(fullData.slice(st.start,st.end+1),maxPoints),keys,colors,H,unit,labels);
  return `<div class="chart-zoom" data-zid="${zid}">
    <div id="zc-${zid}">${svg}</div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomStep('${zid}',0.6)">+</button>
      <button class="zoom-btn" onclick="zoomStep('${zid}',${(1/0.6).toFixed(4)})">−</button>
      <button class="zoom-btn" onclick="zoomResetRange('${zid}')" style="font-size:11px">⟲</button>
    </div>
    <div class="zoom-range" id="zr-${zid}">${fmtRangeLabel(_zoomCfg[zid],st.start,st.end)}</div>
  </div>`;
}
// ── KOMBINOVANÝ GRAF (výkon/TF/kadence/výška přeložené přes sebe, zapínatelné) ─
function svgCombo(data,cfg){
  const id="c"+(_chartId++);
  const metrics=cfg.metrics.filter(m=>cfg.active.has(m.key));
  _chartMeta[id]={type:"combo",data,metrics};
  const W=CHART_W,p=CHART_PAD,H=cfg.H||190;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const px=i=>p.l+i/(data.length-1||1)*cw;
  const norm=(v,key)=>{const r=cfg.metricRange[key],range=(r.max-r.min)||1;return (v-r.min)/range;};
  const py=frac=>p.t+ch-frac*ch;
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  const step=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{if(i%step===0)s+=`<line x1="${px(i)}" y1="${p.t}" x2="${px(i)}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;}
  data.forEach((d,i)=>{if(i%step===0)s+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label}</text>`;});
  metrics.forEach(m=>{
    const pts=data.map((d,i)=>`${px(i)},${py(norm(d[m.key]||0,m.key))}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${m.color}" stroke-width="2"/>`;
  });
  if(!metrics.length)s+=`<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#475569" font-size="11">Zapni alespoň jednu metriku níže</text>`;
  return s+`</svg>`;
}
function comboWrapChart(fullData,metrics,zid,maxPoints=100){
  const metricRange={};
  metrics.forEach(m=>{const vals=fullData.map(d=>d[m.key]||0);metricRange[m.key]={min:Math.min(...vals),max:Math.max(...vals)};});
  const prevActive=_zoomCfg[zid]&&_zoomCfg[zid].active;
  const active=prevActive||new Set(metrics.map(m=>m.key));
  _zoomCfg[zid]={type:"combo",fullData,metrics,metricRange,H:190,maxPoints,active};
  if(!_zoomState[zid]||_zoomState[zid].end>=fullData.length)_zoomState[zid]={start:0,end:fullData.length-1};
  const st=_zoomState[zid];
  const svg=svgCombo(decimate(fullData.slice(st.start,st.end+1),maxPoints),_zoomCfg[zid]);
  const legend=metrics.map(m=>`<label style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${active.has(m.key)?m.color:"#475569"};margin-right:14px;margin-bottom:6px;cursor:pointer">
    <input type="checkbox" ${active.has(m.key)?"checked":""} onchange="toggleComboSeries('${zid}','${m.key}')" style="accent-color:${m.color};width:14px;height:14px">${m.label}
  </label>`).join("");
  return `<div id="combo-legend-${zid}" style="margin-bottom:6px">${legend}</div>
  <div class="chart-zoom" data-zid="${zid}">
    <div id="zc-${zid}">${svg}</div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomStep('${zid}',0.6)">+</button>
      <button class="zoom-btn" onclick="zoomStep('${zid}',${(1/0.6).toFixed(4)})">−</button>
      <button class="zoom-btn" onclick="zoomResetRange('${zid}')" style="font-size:11px">⟲</button>
    </div>
    <div class="zoom-range" id="zr-${zid}">${fmtRangeLabel(_zoomCfg[zid],st.start,st.end)}</div>
  </div>`;
}
function toggleComboSeries(zid,key){
  const cfg=_zoomCfg[zid];
  if(!cfg)return;
  if(cfg.active.has(key))cfg.active.delete(key);else cfg.active.add(key);
  renderZoomChart(zid);
  const m=cfg.metrics.find(x=>x.key===key);
  const lbl=event.currentTarget.closest("label");
  if(lbl&&m)lbl.style.color=cfg.active.has(key)?m.color:"#475569";
}
function setWindowRaw(zid,start,end){
  const cfg=_zoomCfg[zid],N=cfg.fullData.length;
  let L=Math.max(3,Math.min(N-1,end-start));
  let s=start,e=start+L;
  if(s<0){e-=s;s=0;}
  if(e>N-1){s-=(e-(N-1));e=N-1;}
  s=Math.max(0,Math.round(s));e=Math.min(N-1,Math.round(e));
  if(e<=s)e=Math.min(N-1,s+3);
  _zoomState[zid]={start:s,end:e};
  renderZoomChart(zid);
}
function zoomStep(zid,factor){
  const st=_zoomState[zid],mid=(st.start+st.end)/2,L=(st.end-st.start)*factor;
  setWindowRaw(zid,mid-L/2,mid+L/2);
}
function zoomResetRange(zid){
  const cfg=_zoomCfg[zid];
  _zoomState[zid]={start:0,end:cfg.fullData.length-1};
  renderZoomChart(zid);
}
function clientXToFrac(zid,clientX){
  const svgEl=document.querySelector(`#zc-${zid} svg`);
  if(!svgEl)return 0.5;
  const rect=svgEl.getBoundingClientRect();
  const p=CHART_PAD,W=CHART_W;
  const relX=(clientX-rect.left)/rect.width*W;
  return Math.max(0,Math.min(1,(relX-p.l)/(W-p.l-p.r)));
}
function screenXToIndex(zid,clientX){
  const st=_zoomState[zid];
  return st.start+clientXToFrac(zid,clientX)*(st.end-st.start);
}
function initChartZoom(){
  document.querySelectorAll(".chart-zoom").forEach(box=>{
    if(box._zoomInit)return;box._zoomInit=true;
    const zid=box.dataset.zid;
    const pts={};let pinch=null,pan=null;
    box.addEventListener("pointerdown",e=>{
      pts[e.pointerId]={x:e.clientX,y:e.clientY};
      const ids=Object.keys(pts);
      if(ids.length===2){
        pan=null;
        ids.forEach(id=>{try{box.setPointerCapture(Number(id));}catch(err){}});
        const p2=ids.map(id=>pts[id]);
        pinch={ia:screenXToIndex(zid,p2[0].x),ib:screenXToIndex(zid,p2[1].x)};
      }else if(ids.length===1){
        const st=_zoomState[zid],cfg=_zoomCfg[zid];
        if(st.end-st.start<cfg.fullData.length-1){
          try{box.setPointerCapture(e.pointerId);}catch(err){}
          pan={startAt:st.start,endAt:st.end,lastX:e.clientX};
        }
      }
    });
    box.addEventListener("pointermove",e=>{
      if(!pts[e.pointerId])return;
      pts[e.pointerId]={x:e.clientX,y:e.clientY};
      const ids=Object.keys(pts);
      if(ids.length===2&&pinch){
        const p2=ids.map(id=>pts[id]);
        const fracA=clientXToFrac(zid,p2[0].x),fracB=clientXToFrac(zid,p2[1].x);
        if(Math.abs(fracA-fracB)>0.02){
          const L=(pinch.ia-pinch.ib)/(fracA-fracB);
          const newStart=pinch.ia-fracA*L;
          setWindowRaw(zid,newStart,newStart+L);
        }
      }else if(ids.length===1&&pan){
        const svgEl=document.querySelector(`#zc-${zid} svg`);
        const rect=svgEl?svgEl.getBoundingClientRect():box.getBoundingClientRect();
        const p=CHART_PAD,W=CHART_W;
        const plotFracW=(W-p.l-p.r)/W;
        const L=pan.endAt-pan.startAt;
        const dx=e.clientX-pan.lastX;
        const idxDelta=-(dx/rect.width)*(L/plotFracW);
        setWindowRaw(zid,pan.startAt+idxDelta,pan.endAt+idxDelta);
      }
    });
    const endPtr=e=>{
      delete pts[e.pointerId];
      const ids=Object.keys(pts);
      pinch=null;
      if(ids.length===1){
        const st=_zoomState[zid],cfg=_zoomCfg[zid];
        pan=(st.end-st.start<cfg.fullData.length-1)?{startAt:st.start,endAt:st.end,lastX:pts[ids[0]].x}:null;
      }else pan=null;
    };
    box.addEventListener("pointerup",endPtr);
    box.addEventListener("pointercancel",endPtr);
    box.addEventListener("pointerleave",e=>{if(Object.keys(pts).length<2)endPtr(e);});
    box.addEventListener("wheel",e=>{
      e.preventDefault();
      const st=_zoomState[zid];
      const anchorIdx=screenXToIndex(zid,e.clientX);
      const frac=clientXToFrac(zid,e.clientX);
      const factor=e.deltaY<0?0.8:1.25;
      const L=(st.end-st.start)*factor;
      const newStart=anchorIdx-frac*L;
      setWindowRaw(zid,newStart,newStart+L);
    },{passive:false});
  });
}

// Full render - used only when the tab is freshly opened
function renderJizdy(){
  if(!RIDES.length)return noData();
  const shown=Math.min(jizdyShown,RIDES.length);
  return `<div style="font-size:12px;color:#64748b;margin-bottom:8px" id="jizdy-count">Zobrazeno ${shown} z ${RIDES.length} jízd · klikni pro detail</div>`+
  `<div id="jizdy-list">${RIDES.slice(0,shown).map(renderRideCard).join("")}</div>`+
  jizdyFooterHTML(shown);
}

// Scroll-triggered load: appends only the new batch of cards, doesn't touch existing DOM nodes
function loadMoreJizdy(){
  if(jizdyShown>=RIDES.length)return;
  const prevShown=jizdyShown;
  jizdyShown=Math.min(jizdyShown+30,RIDES.length);
  if(currentTab!=="jizdy")return;
  const list=document.getElementById("jizdy-list");
  const oldSentinel=document.getElementById("jizdy-sentinel");
  if(!list){document.getElementById("content").innerHTML=renderJizdy();initJizdyScroll();return;}
  const newCardsHTML=RIDES.slice(prevShown,jizdyShown).map(renderRideCard).join("");
  list.insertAdjacentHTML("beforeend",newCardsHTML);
  if(oldSentinel)oldSentinel.outerHTML=jizdyFooterHTML(jizdyShown);
  const countEl=document.getElementById("jizdy-count");
  if(countEl)countEl.textContent=`Zobrazeno ${jizdyShown} z ${RIDES.length} jízd · klikni pro detail`;
  initJizdyScroll();
}

function initJizdyScroll(){
  const sentinel=document.getElementById("jizdy-sentinel");
  if(jizdyObserver){jizdyObserver.disconnect();jizdyObserver=null;}
  if(!sentinel)return;
  jizdyObserver=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting)loadMoreJizdy();
  },{root:null,rootMargin:"300px"});
  jizdyObserver.observe(sentinel);
}

function toggleRide(id){
  selRide=selRide===id?null:id;
  if(currentTab!=="jizdy")return;
  const el=document.getElementById("ride-"+id);
  const r=RIDES.find(x=>x.id===id);
  if(el&&r)el.outerHTML=renderRideCard(r);
}

}

function fmtClock(totalSec){
  totalSec=Math.max(0,Math.round(totalSec||0));
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=totalSec%60;
  return h>0?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;
}
function getRideStreams(id){return rideStreamsCache[id]||null;}
function trimRideStreamsCache(){
  const keys=Object.keys(rideStreamsCache);
  if(keys.length>60){keys.slice(0,keys.length-40).forEach(k=>delete rideStreamsCache[k]);}
}
function saveRideStreams(id,data){

  catch(e){trimRideStreamsCache();try{localStorage.setItem("cyc_ride_streams",JSON.stringify(rideStreamsCache));}catch(e2){}}
}
async function fetchRideStreamsFromStrava(token,ride){
  const url=`https://www.strava.com/api/v3/activities/${ride.id}/streams?keys=time,watts,heartrate,cadence,altitude&key_by_type=true&resolution=medium`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(res.status===429){const err=new Error("rate_limited");err.rateLimited=true;throw err;}
  if(!res.ok)return null;
  const d=await res.json();
  const pick=k=>d[k]&&d[k].data?d[k].data:null;
  const time=pick("time");
  if(!time||!time.length)return null;
  return {t:time,w:pick("watts"),hr:pick("heartrate"),cad:pick("cadence"),alt:pick("altitude"),fetchedAt:Date.now()};
}
function buildStreamSeries(sd){
  const t=sd.t||[],n=t.length;
  const w=sd.w||[],hr=sd.hr||[],cad=sd.cad||[],alt=sd.alt||[];
  const arr=new Array(n);
  for(let i=0;i<n;i++)arr[i]={label:fmtClock(t[i]),t:t[i],w:w[i]||0,hr:hr[i]||0,cad:cad[i]||0,alt:alt[i]||0};
  return arr;
}
function calcNP(wArr,dt){
  if(!wArr||!wArr.length)return 0;
  const winN=Math.max(1,Math.round(30/(dt||1)));
  let sum=0,sumQ=0;
  for(let i=0;i<wArr.length;i++){
    sum+=wArr[i];
    if(i>=winN)sum-=wArr[i-winN];
    const cnt=Math.min(i+1,winN);
    const avg=sum/cnt;
    sumQ+=Math.pow(avg,4);
  }
  return Math.round(Math.pow(sumQ/wArr.length,0.25));
}
function calcZoneTime(wArr,dt){
  const zones=getZones(S.ftp);
  const secs=zones.map(()=>0);
  wArr.forEach(w=>{
    let idx=zones.findIndex(z=>w>=z.min&&w<z.max);
    if(idx<0)idx=zones.length-1;
    secs[idx]+=(dt||1);
  });
  const total=secs.reduce((a,b)=>a+b,0)||1;
  return zones.map((z,i)=>({...z,sec:secs[i],pct:Math.round(secs[i]/total*100)}));
}
function calcBestEfforts(id,wArr,dt,durationSec){
  const cached=pcCache()[id];
  return PC_DURATIONS.filter(pd=>Number(pd.k)<=durationSec+5).map(pd=>{
    if(cached&&cached[pd.k])return {l:pd.l,v:cached[pd.k]};
    const n=Math.max(1,Math.round(Number(pd.k)/(dt||1)));
    return {l:pd.l,v:Math.round(maxAvgWindow(wArr,n))};
  });
}

    }
  });

}

const COACH_SYSTEM_PROMPT = `Jsi EliteCoach — expertní cyklistický trenér s hlubokou znalostí sportovní fyziologie a periodizace. Vycházíš z těchto vědecky podložených principů:

FYZIOLOGIE A TRÉNINKOVÉ ZÓNY:
- FTP (Functional Threshold Power) = maximální udržitelný výkon po dobu 1 hodiny
- VO2max intervaly (115-120% FTP, 3-8 min) stimulují maximální aerobní kapacitu
- Sweet Spot (88-93% FTP) = nejefektivnější zóna pro zvýšení FTP s přijatelnou únavou
- Polarizovaný trénink: 80% objemu v Z1-Z2, 20% v Z4-Z5 (Seiler princip)
- Tempo zóna (Z3, 76-90% FTP) má nižší poměr adaptace/únava — používej střídmě

CTL/ATL/TSB PERIODIZACE:
- CTL (Chronic Training Load, 42d): ideální nárůst max 5-8 TSS bodů týdně, jinak riziko přetrénování
- ATL (Acute Training Load, 7d): odráží čerstvou únavu
- TSB (Training Stress Balance = CTL-ATL): 
  * TSB < -20: přetrénování, nutný odpočinek
  * TSB -10 až -20: těžká tréninkový blok, sleduj únavu
  * TSB -5 až +5: neutrální, normální trénink
  * TSB +5 až +15: svěží, vhodné pro intenzitu nebo závod
  * TSB > +15: velmi svěží, ideální na FTP test nebo závod

REGENERACE A ADAPTACE:
- Adaptace probíhá BĚHEM odpočinku, ne při tréninku
- Elevovaná klidová TF o 5+ bpm = signál neplete regenerace
- Po nemoci: návrat postupný, nejprve Z1-Z2, intenzita až po normalizaci TF poměru
- Deload každý 3-4. týden: objem -30%, bez intenzity nad Z3
- Spánek je nejdůležitější regenerační nástroj

SPECIFIKA CYKLISTIKY:
- Kadence 85-95 rpm = efektivní šlapání, snižuje namáhání svalů
- Venkovní jízdy vs Zwift: venkovní mají vyšší variabilitu výkonu (kopce), VI (Variability Index) bývá vyšší
- Long rides v Z2 budují tukový metabolismus a mitochondriální hustotu
- SST 3x15 nebo 2x20 min = páteř FTP budování pro amatéry
- VO2max intervaly 6x3 min nebo 5x4 min = nejefektivnější formát pro časově limitované sportovce

ODPOVÍDEJ VŽDY:
1. Krátké shrnutí aktuálního stavu (2-3 věty)
2. Konkrétní doporučení na KAŽDÝ den příštího týdne (typ tréninku, watty, délka)
3. Proč — fyziologické zdůvodnění
4. Na co si dát pozor
Odpovídej v češtině, stručně ale konkrétně. Watty vždy uváděj jako % FTP i absolutní hodnotu.`;

function buildAthleteContext(days=14){
  const recent=RIDES.slice(0,days);
  const totalTSS=recent.reduce((s,r)=>s+r.tss,0);
  const avgWatts=Math.round(recent.filter(r=>r.watts>0).reduce((s,r)=>s+r.watts,0)/Math.max(1,recent.filter(r=>r.watts>0).length));
  const avgHR=Math.round(recent.filter(r=>r.hr>0).reduce((s,r)=>s+r.hr,0)/Math.max(1,recent.filter(r=>r.hr>0).length));
  const totalHours=Math.round(recent.reduce((s,r)=>s+r.dur,0)/360)/10;
  const zwiftCount=recent.filter(r=>r.type==="VirtualRide").length;
  const outdoorCount=recent.filter(r=>r.type==="Ride").length;
  const today=new Date().toLocaleDateString("cs-CZ",{weekday:"long",day:"numeric",month:"long"});
  return `Datum: ${today}
Sportovec: ${S.name}, ${S.weight}kg, FTP ${S.ftp}W (${(S.ftp/S.weight).toFixed(2)} W/kg)
Forma (CTL): ${LATEST.ctl} | Únava (ATL): ${LATEST.atl} | Svěžest (TSB): ${LATEST.tsb}
Tréninkový cíl: ${S.goal}
Zdravotní stav: ${S.notes||"bez omezení"}

Posledních ${days} jízd (TSS celkem: ${totalTSS}, ${totalHours}h, průměr ${avgWatts}W, průměr TF ${avgHR}bpm, Zwift: ${zwiftCount}x, venkovní: ${outdoorCount}x):
${recent.map(r=>`• ${r.date} [${r.type==="VirtualRide"?"Zwift":"Venkovní"}] ${r.name}: ${r.watts}W avg, TF ${r.hr}bpm, ${Math.round(r.dur/60)}min, ${r.km}km, TSS ${r.tss}${r.prs>0?`, ${r.prs} PR`:""}`).join("\n")}`;
}

// ── CLOUD SYNC (sdílení AI historie, nastavení a POWER CURVE cache mezi zařízeními) ──
// Vyžaduje rozšířený Cloudflare Worker s KV úložištěm (viz worker.js šablona).
// Pokud Worker sync ještě nepodporuje, volání jen tiše selže – appka funguje dál jen lokálně.
// Power-curve cache se SLUČUJE (union podle activity id), ne přepisuje – takže když
// spočítáš část jízd na PC a část na mobilu, obě sady se spojí a nic se neztratí.
function mergeRemotePcCache(remotePc){
  if(!remotePc)return false;
  const local=pcCache();
  let changed=false;
  Object.keys(remotePc).forEach(id=>{if(!local[id]){local[id]=remotePc[id];changed=true;}});
  if(changed)savePcCache(local);
  return changed;
}
async function syncToCloud(){
  if(!S.workerUrl)return;
  const ts=Date.now();
  try{
    // nejdřív stáhni aktuální cloud stav a slouč power-curve cache, ať nepřepíšeme
    // data spočtená mezitím na jiném zařízení
    try{
      const getRes=await fetch(S.workerUrl,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"kv_get",key:"coach_sync"})});
      const getData=await getRes.json().catch(()=>null);
      if(getData&&getData.value&&getData.value.pcCache)mergeRemotePcCache(getData.value.pcCache);
    }catch(e){}
    const res=await fetch(S.workerUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"kv_set",key:"coach_sync",value:{aiHistory,settings:S,planCache,pcCache:pcCache(),ts}})});
    const raw=await res.text();
    if(!res.ok)throw new Error("HTTP "+res.status+": "+raw.slice(0,150));
    localStorage.setItem("cyc_ai_ts",String(ts));
    setSyncBadge("✅ Sync OK (uloženo) · "+new Date(ts).toLocaleTimeString("cs-CZ"));
  }catch(e){setSyncBadge("⚠️ Chyba při ukládání: "+e.message);}
}

async function syncFromCloud(silent){
  if(!S.workerUrl)return;
  try{
    const res=await fetch(S.workerUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"kv_get",key:"coach_sync"})});
    const raw=await res.text();
    if(!res.ok)throw new Error("HTTP "+res.status+": "+raw.slice(0,150));
    let data;
    try{data=JSON.parse(raw);}catch(pe){throw new Error("Worker nevrátil JSON: "+raw.slice(0,150));}
    const remote=data&&data.value;
    if(!remote){if(!silent)setSyncBadge("☁️ Worker OK, ale zatím nic uloženo (zkus nejdřív uložit plán/nastavení)");return;}
    // power-curve cache slučujeme vždy, bez ohledu na timestamp – je to čistě přírůstková data
    const pcChanged=mergeRemotePcCache(remote.pcCache);
    const localTs=Number(localStorage.getItem("cyc_ai_ts")||0);
    if((remote.ts||0)>localTs){
      if(remote.aiHistory){aiHistory=remote.aiHistory;localStorage.setItem("cyc_ai",JSON.stringify(aiHistory));}
      if(remote.settings){S={...S,...remote.settings,workerUrl:S.workerUrl};localStorage.setItem("cyc_s",JSON.stringify(S));}
      if(remote.planCache){planCache=remote.planCache;localStorage.setItem("cyc_plan",JSON.stringify(planCache));}
      localStorage.setItem("cyc_ai_ts",String(remote.ts));
      recompute();updateHeader();
      if(currentTab==="ai"||currentTab==="admin"||currentTab==="plan")showTab(currentTab);
    }
    if(pcChanged&&currentTab==="power")showTab("power");
    if(!silent)setSyncBadge("✅ Sync OK · "+new Date(remote.ts).toLocaleTimeString("cs-CZ"));
  }catch(e){if(!silent)setSyncBadge("⚠️ Chyba při stahování: "+e.message);}
}
function setSyncBadge(txt){const el=document.getElementById("sync-badge");if(el)el.textContent=txt;}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin(){
  const hasSecret=!!localStorage.getItem("cyc_secret");
  const hasToken=!!localStorage.getItem("cyc_token");
  const lastSync=localStorage.getItem("cyc_last_sync")||"nikdy";
  return `
  <div class="card">
    <div style="font-size:15px;font-weight:800;color:#fc4c02;margin-bottom:4px">🔶 Strava Sync</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">Poslední sync: <strong>${lastSync}</strong> · Jízd: <strong>${RIDES.length}</strong></div>
    ${!hasSecret?`
      <div style="background:#1a1200;border:1px solid #854d0e;border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px;color:#fbbf24">⚠️ Zadej Client Secret ze Strava API</div>
      <div class="field-label">Client Secret</div>
      <input type="password" id="secret-input" placeholder="Vlož Strava Client Secret...">
      <button class="btn" onclick="saveSecret()" style="background:#854d0e;margin-top:8px;width:100%">🔑 Uložit</button>
    `:`
      <div style="background:#0f2a1a;border:1px solid #166534;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#34d399">✅ Client Secret uložen · ${hasToken?"Token aktivní":"Nutné přihlášení"}</div>
      <button class="strava-btn" onclick="stravaLogin()">🔶 ${hasToken?"Synchronizovat nové jízdy":"Přihlásit se přes Strava"}</button>
      <button class="btn" onclick="forceSync()" style="background:#334155;margin-top:6px;width:100%;font-size:12px">🔄 Obnovit token a sync</button>
      <button class="btn" onclick="clearSecret()" style="background:#450a0a;margin-top:6px;width:100%;font-size:11px">🗑 Odhlásit Strava</button>
    `}
    <div id="sync-msg" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <div style="font-size:15px;font-weight:800;color:#38bdf8;margin-bottom:4px">🤖 Cloudflare Worker (AI proxy)</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">Potřebné pro AI trenéra. Viz návod níže.</div>
    <div class="field-label">Worker URL</div>
    <input id="worker-url" placeholder="https://xxx.workers.dev" value="${S.workerUrl||""}">
    <button class="btn" onclick="saveWorker()" style="background:#1e40af;margin-top:8px;width:100%">💾 Uložit Worker URL</button>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:8px 10px">
      <span style="font-size:11px;color:#64748b;flex:1" id="sync-badge">☁️ Sync mezi zařízeními zatím neproveden</span>
      <button onclick="syncFromCloud()" style="background:#334155;color:#e2e8f0;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer">🔄 Sync teď</button>
    </div>
    <div style="background:#0f172a;border-radius:8px;padding:10px;margin-top:8px;font-size:11px;color:#94a3b8;line-height:1.6">
      <strong style="color:#38bdf8">Jak nastavit Cloudflare Worker:</strong><br>
      1. Jdi na <strong>workers.cloudflare.com</strong> → přihlas se zdarma<br>
      2. Create Worker → vlož kód z <code>cloudflare-worker.js</code><br>
      3. Settings → Variables → přidej: <code>ANTHROPIC_API_KEY</code> = tvůj Anthropic API klíč<br>
      4. Deploy → zkopíruj URL (*.workers.dev) sem
    </div>
  </div>

  <div class="card">
    <div style="font-size:15px;font-weight:800;color:#a78bfa;margin-bottom:8px">⚙️ Nastavení sportovce</div>
    <div class="grid2">
      <div>
        <div class="field-label">Jméno</div><input id="s-name" value="${S.name}">
        <div class="field-label">FTP (W)</div><input id="s-ftp" type="number" value="${S.ftp}">
        <div class="field-label">Váha (kg)</div><input id="s-weight" type="number" value="${S.weight}">
      </div>
      <div>
        <div class="field-label">Max TF</div><input id="s-maxhr" type="number" value="${S.maxHr}">
        <div class="field-label">Klidová TF</div><input id="s-resthr" type="number" value="${S.restHr}">
        <div style="background:#0f172a;border-radius:8px;padding:8px;margin-top:10px;font-size:11px;color:#64748b">
          W/kg: <span style="color:#a78bfa;font-weight:700">${(S.ftp/S.weight).toFixed(2)}</span>
        </div>
      </div>
    </div>
    <div class="field-label">Tréninkový cíl</div><textarea id="s-goal" rows="2">${S.goal}</textarea>
    <div class="field-label">Zdravotní poznámky</div><textarea id="s-notes" rows="2">${S.notes}</textarea>
    <div class="field-label">AI System Prompt</div><textarea id="s-prompt" rows="3">${S.sysPrompt}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" id="save-btn" onclick="saveSettings()" style="flex:1;background:#1e40af">💾 Uložit vše</button>
      <button class="btn" onclick="clearAllData()" style="background:#7f1d1d;font-size:11px">🗑 Reset</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:#64748b">
      <span>Cache detailů jízd: ${Object.keys(rideStreamsCache).length} jízd</span>
      <button onclick="clearRideStreamsCache()" style="background:#0f172a;border:1px solid #334155;border-radius:6px;color:#94a3b8;font-size:10px;padding:4px 10px;cursor:pointer">Vymazat</button>
    </div>
  </div>`;
}
function clearRideStreamsCache(){rideStreamsCache={};localStorage.removeItem("cyc_ride_streams");showTab("admin");}

function saveSecret(){const v=document.getElementById("secret-input")?.value?.trim();if(!v)return;localStorage.setItem("cyc_secret",v);showTab("admin");}
function clearSecret(){if(confirm("Odhlásit Strava?")){["cyc_secret","cyc_token","cyc_refresh","cyc_token_exp"].forEach(k=>localStorage.removeItem(k));showTab("admin");}}
async function forceSync(){const t=await getToken();if(t)await syncRides(t);else stravaLogin();}
function saveWorker(){const v=document.getElementById("worker-url")?.value?.trim();S.workerUrl=v;localStorage.setItem("cyc_s",JSON.stringify(S));const btn=event.target;btn.textContent="✅ Uloženo!";setTimeout(()=>btn.textContent="💾 Uložit Worker URL",2000);}
function saveSettings(){
  const gv=id=>document.getElementById(id)?.value??null;
  const gn=id=>{ const v=Number(document.getElementById(id)?.value); return v>0?v:S[id.replace("s-","").replace("maxhr","maxHr").replace("resthr","restHr")]; };
  if(gv("s-name")!==null) S.name=gv("s-name")||S.name;
  S.ftp=Number(gv("s-ftp"))||S.ftp;
  S.weight=Number(gv("s-weight"))||S.weight;
  S.maxHr=Number(gv("s-maxhr"))||S.maxHr;
  S.restHr=Number(gv("s-resthr"))||S.restHr;
  if(gv("s-goal")!==null) S.goal=gv("s-goal");
  if(gv("s-notes")!==null) S.notes=gv("s-notes");
  if(gv("s-prompt")!==null) S.sysPrompt=gv("s-prompt")||S.sysPrompt;
  localStorage.setItem("cyc_s",JSON.stringify(S));
  syncToCloud();
  recompute();updateHeader();
  const btn=document.getElementById("save-btn");
  if(btn){btn.textContent="✅ Uloženo!";btn.style.background="#16a34a";setTimeout(()=>{btn.textContent="💾 Uložit vše";btn.style.background="#1e40af";},2000);}
}
function clearAllData(){if(confirm("Smazat VŠECHNA data?")){["cyc_s","cyc_rides","cyc_ai","cyc_last_sync","cyc_ride_streams","cyc_pc_cache"].forEach(k=>localStorage.removeItem(k));RIDES=[];FITNESS=[];LATEST={ctl:0,atl:0,tsb:0};S={...DEFAULT_S};rideStreamsCache={};detailRideId=null;updateHeader();showTab("admin");}}
const DEFAULT_S={name:"Jiří Votava",ftp:245,weight:77,maxHr:178,restHr:48,goal:"Zvýšit FTP na 270W.",notes:"",sysPrompt:"Jsi profesionální cyklistický trenér. Odpovídáš stručně, konkrétně, v češtině.",quickQ:["Jak jsem na tom?","Co jet zítra?","FTP trend","Kdy FTP test?","Jsem zotavený?"],workerUrl:""};

// ── INIT ──────────────────────────────────────────────────────────────────────
recompute();updateHeader();
const savedTab=localStorage.getItem("cyc_tab")||"forma";
handleOAuth().then(was=>{if(!was)showTab(savedTab);});
syncFromCloud(true);
</script>
</body>
</html>
