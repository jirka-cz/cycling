<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Cycling"/>
<title>🚴 Cycling Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:12px 14px 10px;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:10}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.kpi{background:#0f172a;border-radius:8px;padding:8px 6px;border:1px solid #1e293b;text-align:center}
.kpi-label{font-size:9px;color:#64748b;text-transform:uppercase}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1}
.kpi-sub{font-size:9px;color:#94a3b8}
.nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom,4px)}
.nav-btn{flex:1;background:none;border:none;padding:10px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-icon{font-size:18px}
.nav-lbl{font-size:9px;font-weight:600;color:#64748b}
.nav-lbl.active{color:#38bdf8}
.content{padding:12px 12px 80px}
.card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.card-title{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:#64748b;margin-bottom:10px}
.info-btn{background:#0f172a;border:1px solid #334155;border-radius:50%;width:22px;height:22px;color:#64748b;font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700}
.info-box{background:#0c1929;border:1px solid #1e40af;border-radius:8px;padding:12px;margin-top:8px;font-size:12px;color:#94a3b8;line-height:1.6;display:none}
.info-box.open{display:block}
.info-box h4{color:#38bdf8;font-size:12px;margin-bottom:4px}
.info-box .tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-right:4px;margin-bottom:4px}
.ride{background:#1e293b;border-radius:10px;padding:12px;border:1px solid #334155;margin-bottom:8px;cursor:pointer}
.ride-name{font-size:13px;font-weight:600;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ride-meta{font-size:10px;color:#64748b;margin-top:2px}
.ride-stats{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.ride-stat{font-size:11px;color:#94a3b8}
.copy-id{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#64748b;font-size:10px;padding:2px 8px;cursor:pointer;margin-top:6px}
.copy-id:active{background:#1e40af;color:#fff}
.bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-bg{flex:1;background:#0f172a;border-radius:3px;height:16px;overflow:hidden;position:relative}
.bar-fill{position:absolute;height:100%;border-radius:3px;opacity:.75}
.zone-lbl{font-size:10px;width:22px;font-weight:700}
.zone-range{font-size:10px;color:#64748b;width:70px;text-align:right}
.zone-name{font-size:10px;color:#94a3b8;width:70px}
input,textarea{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:13px;width:100%;font-family:inherit}
textarea{resize:vertical}
.field-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;margin-top:10px}
.btn{border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;padding:10px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-box{background:#0f172a;border-radius:8px;padding:10px}
.kpi-box-info{position:relative;padding-right:24px}
.info-btn-mini{position:absolute;top:6px;right:6px;background:#1e293b;border:1px solid #334155;border-radius:50%;width:16px;height:16px;color:#64748b;font-size:9px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;padding:0}
.kpi-box-label{font-size:10px;color:#64748b}
.kpi-box-val{font-size:18px;font-weight:800;margin:2px 0}
.kpi-box-sub{font-size:10px;color:#94a3b8}
.quick-q{background:#0f172a;color:#94a3b8;border:1px solid #334155;border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;margin:3px}
.ai-box{background:#0f172a;border:1px solid #1e40af;border-radius:10px;padding:14px;margin-top:12px}
.ai-label{font-size:10px;color:#3b82f6;font-weight:700;margin-bottom:6px}
.ai-text{font-size:13px;color:#e2e8f0;line-height:1.6;white-space:pre-wrap}
.strava-btn{background:#fc4c02;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;border-top:1px solid #334155}
.modal-close{float:right;background:none;border:none;color:#64748b;font-size:20px;cursor:pointer}
#chart-tooltip{position:fixed;display:none;background:#0f172a;border:1px solid #38bdf8;border-radius:8px;padding:7px 10px;font-size:11px;line-height:1.5;color:#e2e8f0;pointer-events:none;z-index:999;box-shadow:0 6px 16px rgba(0,0,0,.5);white-space:nowrap}
#chart-tooltip b{font-weight:800}
svg[data-cid]{touch-action:none;cursor:crosshair}
.chart-zoom{position:relative;overflow:hidden;border-radius:8px}
.zoom-range{font-size:9px;color:#475569;text-align:center;margin-top:2px}
.zoom-ctrl{position:absolute;top:2px;right:2px;display:flex;flex-direction:column;gap:4px;z-index:5}
.zoom-btn{width:24px;height:24px;border-radius:6px;background:rgba(15,23,42,.85);border:1px solid #334155;color:#e2e8f0;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.zoom-btn:active{background:#1e40af}
@media (min-width:640px){
  body{display:flex;justify-content:center}
  #app{max-width:480px;width:100%;box-shadow:0 0 60px rgba(0,0,0,.55)}
  .nav{max-width:480px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>
<div id="chart-tooltip"></div>
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:22px">🚴</span>
      <div>
        <div style="font-size:16px;font-weight:800;color:#f8fafc" id="h-name">Jiří Votava</div>
        <div style="font-size:11px;color:#64748b" id="h-sub">Načítám data...</div>
      </div>
      <div style="margin-left:auto;font-size:10px;color:#475569;text-align:right" id="sync-info"></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">CTL</div><div class="kpi-val" style="color:#38bdf8" id="kpi-ctl">-</div><div class="kpi-sub">Forma</div></div>
      <div class="kpi"><div class="kpi-label">ATL</div><div class="kpi-val" style="color:#fb923c" id="kpi-atl">-</div><div class="kpi-sub">Únava</div></div>
      <div class="kpi"><div class="kpi-label">TSB</div><div class="kpi-val" id="kpi-tsb">-</div><div class="kpi-sub" id="kpi-tsb-lbl">-</div></div>
      <div class="kpi"><div class="kpi-label">FTP</div><div class="kpi-val" style="color:#a78bfa" id="kpi-ftp">-</div><div class="kpi-sub" id="kpi-wkg">-</div></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav">
    <button class="nav-btn" onclick="showTab('forma')"><span class="nav-icon">📈</span><span class="nav-lbl" id="nl-forma">Forma</span></button>
    <button class="nav-btn" onclick="showTab('power')"><span class="nav-icon">⚡</span><span class="nav-lbl" id="nl-power">Power</span></button>
    <button class="nav-btn" onclick="showTab('jizdy')"><span class="nav-icon">🚴</span><span class="nav-lbl" id="nl-jizdy">Jízdy</span></button>
    <button class="nav-btn" onclick="showTab('tf')"><span class="nav-icon">❤️</span><span class="nav-lbl" id="nl-tf">TF</span></button>
    <button class="nav-btn" onclick="showTab('plan')"><span class="nav-icon">📅</span><span class="nav-lbl" id="nl-plan">Plán</span></button>
    <button class="nav-btn" onclick="showTab('treninky')"><span class="nav-icon">🏋️</span><span class="nav-lbl" id="nl-treninky">Tréninky</span></button>
    <button class="nav-btn" onclick="showTab('ai')"><span class="nav-icon">🤖</span><span class="nav-lbl" id="nl-ai">AI</span></button>
    <button class="nav-btn" onclick="showTab('admin')"><span class="nav-icon">⚙️</span><span class="nav-lbl" id="nl-admin">Admin</span></button>
  </nav>
</div>

<script>
const CLIENT_ID = "265810";
const REDIRECT_URI = location.origin + location.pathname;

let S = JSON.parse(localStorage.getItem("cyc_s")||"null") || {
  name:"Jiří Votava", ftp:245, weight:77, maxHr:178, restHr:48,
  goal:"Zvýšit FTP na 270W a VO2max do konce roku 2026.",
  notes:"Po střevních potížích v červenci — TF elevovaná +12bpm. Regenerace priorita.",
  sysPrompt:"Jsi profesionální cyklistický trenér. Odpovídáš stručně, konkrétně, v češtině. Vždy vezmi v úvahu CTL/ATL/TSB, historii jízd a zdravotní stav.",
  quickQ:["Jak jsem na tom?","Co jet zítra?","FTP trend","Kdy FTP test?","Jsem zotavený?"],
  workerUrl:"",
  ftpMode:"auto", // "auto" = FTP se počítá ze Strava dat (reálné), "manual" = simulace s ručně zadaným FTP
  ftpTestKeywords:"ramp,ftp test,ramp test,ftp ramp",
  ftpManualEntries:[],
};
if(!S.ftpMode)S.ftpMode="auto";
if(!S.ftpTestKeywords)S.ftpTestKeywords="ramp,ftp test,ramp test,ftp ramp";
if(!S.ftpManualEntries)S.ftpManualEntries=[];
if(!S.weeklyHours)S.weeklyHours=8;
let RIDES = JSON.parse(localStorage.getItem("cyc_rides")||"[]");
let aiHistory = JSON.parse(localStorage.getItem("cyc_ai")||"[]");
let FITNESS=[], LATEST={ctl:0,atl:0,tsb:0};
let currentTab="forma", selRide=null, aiLoading=false, planLoading=false;
let jizdyShown=30, jizdyObserver=null;
let aiRideCtx=[];
let planCache=JSON.parse(localStorage.getItem("cyc_plan")||"null");
let TRAINING_PLANS=JSON.parse(localStorage.getItem("cyc_workouts")||"[]");
let swapSourceId=null;
let planWeekStart=localStorage.getItem("cyc_plan_week_start")||null;
let detailRideId=null;
let rideStreamsCache=JSON.parse(localStorage.getItem("cyc_ride_streams")||"{}");

// ── INFO TEXTS ────────────────────────────────────────────────────────────────
const INFO = {
  ctl: `<h4>CTL — Chronic Training Load (Tréninková forma)</h4>
    Průměrná tréninkový zátěž za posledních <strong>42 dní</strong>. Představuje tvůj dlouhodobý "základ kondice".<br><br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">< 20</span> Začátečník / po pauze<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">20–40</span> Rekreační cyklista<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">40–70</span> Aktivní amatér (ty teď)<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">70–100</span> Závodník<br><br>
    <strong>Jak interpretovat:</strong> CTL roste pomalu při konzistentním tréninku. Po nemoci nebo pauze klesá. Tvůj cíl je dostat CTL nad 50 při zachování TSB v pozitivních hodnotách.`,

  atl: `<h4>ATL — Acute Training Load (Akutní únava)</h4>
    Průměrná zátěž za posledních <strong>7 dní</strong>. Odráží čerstvou únavu těla.<br><br>
    <strong>Jak interpretovat:</strong><br>
    • ATL výrazně nad CTL = přetrénování, riziko zranění<br>
    • ATL pod CTL = odpočinek, tělo se zotavuje<br>
    • ATL ≈ CTL = udržovací fáze<br><br>
    <strong>Tvoje hodnoty:</strong> Po náročné jízdě (122km, 4.7.) ATL vyskočilo na 60+. Nyní se vrací dolů — to je normální po nemoci.`,

  tsb: `<h4>TSB — Training Stress Balance (Svěžest / Forma)</h4>
    TSB = CTL − ATL. Říká, jestli jsi odpočatý nebo unavený.<br><br>
    <span class="tag" style="background:#0a2a0a;color:#34d399">> +10</span> Velmi svěží — ideální na závod nebo FTP test<br>
    <span class="tag" style="background:#0a2a0a;color:#34d399">+5 až +10</span> Svěží — dobré na intenzitu<br>
    <span class="tag" style="background:#2a2000;color:#fbbf24">-5 až +5</span> Neutrální — trénuj opatrně<br>
    <span class="tag" style="background:#2a0a0a;color:#ef4444">-10 až -5</span> Mírně unavený<br>
    <span class="tag" style="background:#2a0a0a;color:#ef4444">< -10</span> Unavený — přidej regeneraci<br><br>
    <strong>Tvoje situace:</strong> TSB 6.2 = jsi svěží. Po nemoci a 122km jízdě ses dobře zotavil.`,

  power: `<h4>Power Curve</h4>
    Ukazuje nejlepší průměrný výkon (watty) pro různé délky úsilí — od 5 sekund do 1 hodiny.<br><br>
    <strong>Co sledovat:</strong><br>
    • <strong>5s–30s</strong>: sprint a neuromuskulární výkon<br>
    • <strong>1–5 min</strong>: VO2max zóna — klíčová pro rozvoj kapacity<br>
    • <strong>20–60 min</strong>: FTP zóna — základní výkonnost<br><br>
    <strong>Poměr 20min/5min výkon</strong> ideálně 70–75 %. Tvoje rezerva je právě zde — krátkodobý výkon je silný, FTP vytrvalost má prostor pro růst.`,

  zones: ()=>`<h4>Výkonnostní zóny</h4>
    Zóny jsou odvozeny od tvého FTP (${getCurrentFtp()}W).<br><br>
    <strong>Z1 Regenerace:</strong> Velmi lehce, aktivní zotavení. Nezlepšuje výkonnost, pomáhá regenerovat.<br>
    <strong>Z2 Aerobní:</strong> Základ kondice. 80% objemu má být zde. Buduje tukový metabolismus.<br>
    <strong>Z3 Tempo:</strong> "Nepříjemná" zóna — nezlepšuje výkonnost tolik jako Z2 nebo Z4/Z5.<br>
    <strong>Z4 Práh/SST:</strong> SST (88–93% FTP) a FTP intervaly. Nejefektivnější pro zvýšení FTP.<br>
    <strong>Z5 VO2max:</strong> Krátké intenzivní intervaly (3–6 min). Zvyšuje maximální kyslíkovou kapacitu.<br>
    <strong>Z6 Anaerobní:</strong> Micro-bursts, sprinty. Zlepšuje laktátovou toleranci.`,

  ratio: `<h4>Poměr W/bpm — Aerobní efektivita</h4>
    Kolik wattů vyprodukuješ na jeden úder srdce. Vyšší hodnota = efektivnější kardiovaskulární systém.<br><br>
    <strong>Jak interpretovat trend:</strong><br>
    • Trend ↑ = kondice roste, srdce pracuje efektivněji<br>
    • Náhlý pokles = únava, nemoc nebo přetrénování<br>
    • Stabilní hodnota = udržovací fáze<br><br>
    <strong>Tvoje pozorování:</strong> Po nemoci (11.7.) a náročné jízdě (4.7.) poměr klesl — TF byl +12bpm nad normálem při stejném výkonu. Nyní by se měl vracet na normál.`,

  volume: `<h4>Týdenní objem (hodiny)</h4>
    Celkové hodiny strávené na kole každý týden.<br><br>
    <strong>Jak interpretovat:</strong><br>
    • Konzistentní objem (±20%) = ideální pro progres<br>
    • Velký spike (jako květen 2026 u tebe) = vysoké riziko přetrénování<br>
    • Pokles = nemoc, deload, nebo nedostatek času<br><br>
    <strong>Tvůj profil:</strong> Květen byl extrémní (DPNK akce). Červenec je nižší objem po nemoci — to je správně, tělo potřebuje nabrat síly.`,

  ftp: ()=>`<h4>FTP — Functional Threshold Power</h4>
    Nejvyšší průměrný výkon v wattech, který udržíš po dobu 1 hodiny. Základní metrika výkonnosti cyklisty.<br><br>
    <strong>W/kg klíčová čísla:</strong><br>
    <span class="tag" style="background:#1e293b;color:#94a3b8">&lt; 2.5</span> Rekreační<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">2.5–3.0</span> Sportovec<br>
    <span class="tag" style="background:#0a2a0a;color:#34d399">3.0–3.5</span> Pokročilý (ty: ${(getCurrentFtp()/S.weight).toFixed(2)})<br>
    <span class="tag" style="background:#2a1500;color:#fbbf24">3.5–4.0</span> Závodník<br>
    <span class="tag" style="background:#2a0a0a;color:#ef4444">&gt; 4.0</span> Elite<br><br>
    <strong>Odkud se bere tvoje FTP:</strong> Nezadáváš ho paušálně ručně — počítá se jen z jízd, jejichž název odpovídá klíčovým slovům pro FTP test (nastavíš v Adminu, výchozí "ramp", "ftp test"), plus z ručně přidaných záznamů k libovolnému datu (test odjinud, úprava po nemoci apod.). Nejnovější platný záznam k danému dni určuje tehdejší FTP — může jít nahoru i dolů, žádný "jen rostoucí" filtr. Běžné jízdy se do toho nepočítají. V Adminu si navíc můžeš pro porovnání zapnout ruční "co by bylo kdyby" simulaci.`,

  rideNP: `<h4>NP — Normalizovaný výkon</h4>
    Není to prostý průměr, ale vážený výkon, který zohledňuje kolísání (klouzavý 30s průměr umocněný na 4. a pak odmocněný). Lépe vyjadřuje skutečnou fyziologickou zátěž jízdy — u přerušovaných/kopcovitých jízd bývá vyšší než průměr, u rovnoměrné jízdy (časovka, Zwift SST) se mu blíží.`,

  rideIF: `<h4>IF — Intensity Factor (NP/FTP)</h4>
    Jak náročná byla jízda vzhledem k tvému FTP.<br><br>
    <span class="tag" style="background:#1e293b;color:#94a3b8">&lt; 0.75</span> Regenerace/Z2<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">0.75–0.85</span> Tempo/vytrvalost<br>
    <span class="tag" style="background:#2a1500;color:#fbbf24">0.85–0.95</span> Práh/SST<br>
    <span class="tag" style="background:#2a0a0a;color:#ef4444">&gt; 0.95</span> Nadprahové/závodní úsilí`,

  rideVI: `<h4>VI — Variabilita výkonu (NP/průměr)</h4>
    Jak "hladký" nebo "trhaný" byl výkon.<br><br>
    • <strong>~1.00–1.05</strong> velmi rovnoměrné (Zwift SST, časovka)<br>
    • <strong>1.05–1.15</strong> běžná venkovní jízda<br>
    • <strong>&gt; 1.15</strong> hodně kolísavý výkon (kopce, peloton, sprinty, group ride)`,

  rideTSS: `<h4>TSS — Training Stress Score</h4>
    Celková zátěž jízdy — kombinuje intenzitu i délku. 100 TSS ≈ 1 hodina na FTP. Právě tahle hodnota se používá pro výpočet CTL/ATL/TSB v záložce Forma.`,

  rideWtep: (ctx)=>`<h4>W/tep — Aerobní/kardio efektivita</h4>
    Kolik wattů "koupíš" za jeden úder srdce. Vyšší = efektivnější podání výkonu vzhledem ke kardio zátěži. Klesá při únavě, nemoci nebo horku, roste s rostoucí kondicí.<br><br>
    <strong>Orientační pásma</strong> (u tvé výkonnosti, FTP ${ctx.ftp||getCurrentFtp()}W k datu jízdy):<br>
    <span class="tag" style="background:#2a0a0a;color:#ef4444">&lt; 1.3</span> Nízká — únava/nemoc/horko, nebo nízká intenzita s vysokou TF<br>
    <span class="tag" style="background:#2a1500;color:#fbbf24">1.3–1.6</span> Průměrná<br>
    <span class="tag" style="background:#0c2a4a;color:#38bdf8">1.6–2.0</span> Dobrá<br>
    <span class="tag" style="background:#0a2a0a;color:#34d399">&gt; 2.0</span> Výborná (svěží, dobře trénovaný)<br><br>
    Nejvíc ale vypovídá <strong>trend v čase u tebe samotného</strong> — číslo hodně závisí na FTP, TF maximu a typu jízdy (Z2 vs. práh), takže napříč cyklisty se moc srovnávat nedá.`,

// ── STRAVA OAUTH ──────────────────────────────────────────────────────────────
function stravaLogin() {
  const url=`https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=activity:read_all`;
  window.location.href=url;
}

async function handleOAuth() {
  const p=new URLSearchParams(window.location.search);
  const code=p.get("code");
  if(!code) return false;
  window.history.replaceState({},"",window.location.pathname);
  const secret=localStorage.getItem("cyc_secret");
  if(!secret){showTab("admin");return true;}
  setSyncInfo("🔄 Přihlašuji...");
  try {
    const r=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({client_id:CLIENT_ID,client_secret:secret,code,grant_type:"authorization_code"})});
    const d=await r.json();
    if(d.access_token){
      localStorage.setItem("cyc_token",d.access_token);
      localStorage.setItem("cyc_refresh",d.refresh_token);
      localStorage.setItem("cyc_token_exp",d.expires_at);
      await syncRides(d.access_token);
    } else setSyncInfo("❌ Chyba: "+(d.message||"?"));
  } catch(e){setSyncInfo("❌ "+e.message);}
  return true;
}

async function getToken() {
  const exp=parseInt(localStorage.getItem("cyc_token_exp")||"0");
  if(Math.floor(Date.now()/1000)>exp-300){
    const r=localStorage.getItem("cyc_refresh"),sec=localStorage.getItem("cyc_secret");
    if(!r||!sec) return null;
    try{
      const res=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({client_id:CLIENT_ID,client_secret:sec,refresh_token:r,grant_type:"refresh_token"})});
      const d=await res.json();
      if(d.access_token){localStorage.setItem("cyc_token",d.access_token);localStorage.setItem("cyc_token_exp",d.expires_at);return d.access_token;}
    }catch(e){}
    return null;
  }
  return localStorage.getItem("cyc_token");
}

async function syncRides(token,force=false) {
  setSyncInfo(force?'<span style="color:#38bdf8">⏳ Stahuji kompletní historii...</span>':'<span style="color:#38bdf8">⏳ Stahuji jízdy...</span>');
  try {
    const cached=JSON.parse(localStorage.getItem("cyc_rides")||"[]");
    let after=0;
    if(!force&&cached.length>0){const n=cached.reduce((a,b)=>a.date>b.date?a:b);after=Math.floor(new Date(n.date).getTime()/1000)+1;}
    let page=1,newRides=[],hasMore=true;
    while(hasMore){
      let url=`https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`;
      if(after>0)url+=`&after=${after}`;
      const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
      const acts=await res.json();
      if(!Array.isArray(acts)||acts.length===0){hasMore=false;break;}
      acts.forEach(a=>{
        if(!["Ride","VirtualRide"].includes(a.sport_type||a.type))return;
        const w=a.average_watts||0;
        const rideDate=(a.start_date_local||"").slice(0,10);
        newRides.push({id:String(a.id),name:a.name,date:rideDate,
          type:a.sport_type||a.type,watts:Math.round(w),wavg:Math.round(a.weighted_average_watts||0),
          hr:Math.round(a.average_heartrate||0),
          dur:a.moving_time||0,km:Math.round((a.distance||0)/100)/10,
          elev:Math.round(a.total_elevation_gain||0),kcal:Math.round(a.calories||a.kilojoules||0),prs:a.pr_count||0,
          _suffer:Math.round(a.suffer_score||30)});
      });
      if(acts.length<100)hasMore=false;
      page++;
    }
    const ids=new Set(cached.map(r=>r.id));
    if(force){
      const map={};
      cached.forEach(r=>map[r.id]=r);
      newRides.forEach(r=>map[r.id]={...map[r.id],...r}); // přepiš/doplň čerstvými daty ze Stravy (např. wavg)
      RIDES=Object.values(map);
    }else{
      RIDES=[...newRides.filter(r=>!ids.has(r.id)),...cached];
    }
    RIDES.sort((a,b)=>b.date.localeCompare(a.date));
    invalidateAutoFtpCache(); // nová data mohou posunout detekované FTP peaky
    RIDES.forEach(r=>{
      const ftpAt=getAutoFtpAtDate(r.date); // reálné FTP odvozené ze Strava dat k datu jízdy
      r.tss=(r.watts>0&&ftpAt>0)?Math.round((r.dur/3600)*(r.watts/ftpAt)*(r.watts/ftpAt)*100):(r.tss||r._suffer||30);
      delete r._suffer;
    });
    localStorage.setItem("cyc_rides",JSON.stringify(RIDES));
    const ts=new Date().toLocaleString("cs-CZ",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    localStorage.setItem("cyc_last_sync",ts);
    autoMatchCompletedRides();
    recompute();updateHeader();showTab(currentTab);
    const n=newRides.filter(r=>!ids.has(r.id)).length;
    setSyncInfo(`✅ ${n} nových · celkem ${RIDES.length}`);
  }catch(e){setSyncInfo("❌ "+e.message);}
}

function setSyncInfo(msg){const el=document.getElementById("sync-info");if(el)el.innerHTML=msg;}

const PC_DURATIONS=[{k:"5",l:"5s"},{k:"60",l:"1min"},{k:"300",l:"5min"},{k:"1200",l:"20min"},{k:"3600",l:"1h"},{k:"7200",l:"2h"},{k:"10800",l:"3h"}];
function pcCache(){try{return JSON.parse(localStorage.getItem("cyc_pc_cache")||"{}");}catch(e){return {};}}
function savePcCache(c){localStorage.setItem("cyc_pc_cache",JSON.stringify(c));}
function maxAvgWindow(arr,n){
  if(!arr||!arr.length)return 0;
  if(n<1)n=1;
  if(n>=arr.length){let s=0;for(const v of arr)s+=v;return s/arr.length;}
  let sum=0;for(let i=0;i<n;i++)sum+=arr[i];
  let max=sum;
  for(let i=n;i<arr.length;i++){sum+=arr[i]-arr[i-n];if(sum>max)max=sum;}
  return max/n;
}
async function fetchActivityBest(token,ride){
  const url=`https://www.strava.com/api/v3/activities/${ride.id}/streams?keys=watts,time&key_by_type=true&resolution=high`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(res.status===429){const err=new Error("rate_limited");err.rateLimited=true;throw err;}
  if(!res.ok)return null;
  const d=await res.json();
  const w=d.watts&&d.watts.data,t=d.time&&d.time.data;
  if(!w||!w.length)return null;
  let dt=1;
  if(t&&t.length>1)dt=(t[t.length-1]-t[0])/(t.length-1)||1;
  const best={date:ride.date};
  PC_DURATIONS.forEach(pd=>{best[pd.k]=Math.round(maxAvgWindow(w,Math.max(1,Math.round(Number(pd.k)/dt))));});
  return best;
}
let _pcRunning=false;
async function updatePowerCurve(limit){
  if(_pcRunning)return;
  _pcRunning=true;
  const statusEl=()=>document.getElementById("pc-status");
  const token=await getToken();
  if(!token){_pcRunning=false;alert("Nejdřív se přihlas přes Strava v záložce Admin.");return;}
  // nejdřív stáhni, co už spočítalo jiné zařízení, ať tu práci neděláme znovu
  if(S.workerUrl){const el=statusEl();if(el)el.textContent="☁️ Kontroluji, co už je spočtené jinde…";await syncFromCloud(true);}
  const cache=pcCache();
  const todo=RIDES.filter(r=>r.watts>0&&!cache[r.id]).slice(0,limit||20);
  let done=0,rateLimited=false;
  for(const r of todo){
    try{
      const best=await fetchActivityBest(token,r);
      if(best)cache[r.id]=best;
      done++;
      savePcCache(cache);
      const el=statusEl();if(el)el.textContent=`Zpracovávám power curve… ${done}/${todo.length}`;
    }catch(e){if(e&&e.rateLimited){rateLimited=true;break;}}
  }
  // ulož spočtené i jen částečně dokončené do cloudu, ať to na dalším zařízení nemusíš počítat znovu
  if(S.workerUrl)await syncToCloud();
  _pcRunning=false;
  if(currentTab==="power")showTab("power");
  if(rateLimited)alert("Strava API dočasně omezilo počet požadavků. Zkus 'Načíst další jízdy' za pár minut.");
}

function aggregatePowerCurve(){
  const cache=pcCache();
  const now=new Date();
  const d42=new Date(now);d42.setDate(d42.getDate()-42);
  const seasonStart=new Date(now.getFullYear(),0,1);
  const rows=PC_DURATIONS.map(pd=>({l:pd.l,k:pd.k,d42:0,season:0}));
  Object.values(cache).forEach(entry=>{
    if(!entry||!entry.date)return;
    const dt=new Date(entry.date);
    rows.forEach(row=>{
      const v=entry[row.k]||0;
      if(dt>=d42&&v>row.d42)row.d42=v;
      if(dt>=seasonStart&&v>row.season)row.season=v;
    });
  });
  return rows;
}

// ── FITNESS CALC ──────────────────────────────────────────────────────────────
function fmtD(iso){const p=String(iso).split("-");return p.length>=3?`${p[2]}.${p[1]}`:iso;}
function recompute(){
  if(!RIDES.length){FITNESS=[];LATEST={ctl:0,atl:0,tsb:0};return;}
  const byDate={};
  RIDES.forEach(r=>{const t=effectiveTss(r);if(t)byDate[r.date]=(byDate[r.date]||0)+t;});
  const start=new Date(Object.keys(byDate).sort()[0]);
  const end=new Date();
  const res=[];let ctl=20,atl=20;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().slice(0,10);
    const tss=byDate[ds]||0;
    ctl=ctl+(tss-ctl)/42;atl=atl+(tss-atl)/7;
    res.push({date:ds,label:fmtD(ds),ctl:+(ctl.toFixed(1)),atl:+(atl.toFixed(1)),tsb:+((ctl-atl).toFixed(1)),tss});
  }
  FITNESS=res;LATEST=res[res.length-1];
}

function getZones(ftp){return[
  {z:"Z1",n:"Regenerace",min:0,max:Math.round(ftp*.55),c:"#94a3b8"},
  {z:"Z2",n:"Aerobní",min:Math.round(ftp*.55),max:Math.round(ftp*.75),c:"#34d399"},
  {z:"Z3",n:"Tempo",min:Math.round(ftp*.75),max:Math.round(ftp*.90),c:"#fbbf24"},
  {z:"Z4",n:"Práh/SST",min:Math.round(ftp*.90),max:Math.round(ftp*1.05),c:"#f97316"},
  {z:"Z5",n:"VO2max",min:Math.round(ftp*1.05),max:Math.round(ftp*1.20),c:"#ef4444"},
  {z:"Z6",n:"Anaerobní",min:Math.round(ftp*1.20),max:9999,c:"#a855f7"},
];}
function getZone(w,ftp){const f=ftp||getCurrentFtp();return getZones(f).find(z=>w>=z.min&&w<z.max)||getZones(f)[0];}

// ── AUTO FTP ZE STRAVA DAT ──────────────────────────────────────────────────────
// FTP se NEZADÁVÁ paušálně ručně — počítá se jen z jízd, které vypadají jako
// SKUTEČNÝ FTP test (podle klíčových slov v názvu, např. "ramp", "FTP test"),
// případně z ručně přidaných záznamů (např. výsledek z Garmin Connect).
// Běžné endurance/Zwift jízdy se do toho NEPOČÍTAJÍ, i kdyby měly slušný výkon.
let _autoFtpPeaksCache=null;
function invalidateAutoFtpCache(){_autoFtpPeaksCache=null;}
function matchesTestKeyword(name){
  const kws=(S.ftpTestKeywords||"ramp,ftp test,ramp test,ftp ramp").split(",").map(k=>k.trim().toLowerCase()).filter(Boolean);
  const n=(name||"").toLowerCase();
  return kws.some(k=>k&&n.includes(k));
}
function estimateFtpFromBest(best,isRamp){
  if(!best)return 0;
  if(isRamp&&best["60"])return Math.round(best["60"]*0.75);   // ramp test: ~75 % nejlepšího 1min výkonu
  if(best["1200"])return Math.round(best["1200"]*0.95);        // klasický 20min test
  if(best["300"])return Math.round(best["300"]*0.85);          // kratší test (fallback)
  if(best["3600"])return Math.round(best["3600"]*1.00);        // hodinová časovka ≈ FTP přímo
  return 0;
}
function computeAutoFtpPeaks(){
  if(_autoFtpPeaksCache)return _autoFtpPeaksCache;
  const cache=pcCache();
  const candidates=[];
  RIDES.forEach(r=>{
    if(!matchesTestKeyword(r.name))return;
    const best=cache[r.id];
    const isRamp=/ramp/i.test(r.name||"");
    let est=best?estimateFtpFromBest(best,isRamp):0;
    let refined=!!est;
    if(!est)est=r.wavg||r.watts||0; // dokud nejsou stažená detailní data, hrubý odhad z průměru/NP jízdy
    if(est>0)candidates.push({date:r.date,rideId:r.id,rideName:r.name,est,refined});
  });
  (S.ftpManualEntries||[]).forEach(e=>{
    if(e.f>0)candidates.push({date:e.d,rideId:null,rideName:e.l||"Ruční záznam",est:e.f,refined:true});
  });
  candidates.sort((a,b)=>a.date.localeCompare(b.date));
  // Každý detekovaný test / ruční záznam = platné FTP od svého data dál — může jít nahoru i dolů
  // (např. pokles po nemoci/pauze), žádný "jen rostoucí" filtr.
  const peaks=candidates.map(c=>({d:c.date,f:c.est,l:c.rideName,rideId:c.rideId,refined:c.refined}));
  _autoFtpPeaksCache=peaks;
  return peaks;
}
function getAutoFtpAtDate(dateStr){
  const peaks=computeAutoFtpPeaks();
  if(!peaks.length)return S.ftp||0; // zatím žádný detekovaný test — použij základní hodnotu z Adminu jako start
  const applicable=peaks.filter(p=>p.d<=dateStr);
  if(applicable.length)return applicable[applicable.length-1].f;
  return peaks[0].f; // jízda předchází první detekovaný test
}
function getCurrentFtp(){return S.ftpMode==="manual"?(S.ftp||0):getAutoFtpAtDate(new Date().toISOString().slice(0,10));}
function getEffectiveFtpAtDate(dateStr){return S.ftpMode==="manual"?(S.ftp||0):getAutoFtpAtDate(dateStr);}
function effectiveTss(r){
  if(S.ftpMode==="manual"&&r.watts>0&&S.ftp>0)return Math.round((r.dur/3600)*(r.watts/S.ftp)*(r.watts/S.ftp)*100);
  return r.tss||0;
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
const CHART_W=340,CHART_PAD={t:10,r:8,b:26,l:32};
let _chartMeta={},_chartId=0;
const CHART_EVTS='onpointerdown="chartTip(event)" onpointermove="chartTip(event)" onpointerup="chartTip(event)" onpointerleave="hideTip()"';

function svgLine(data,keys,colors,H=160,unit="",labels=null){
  const id="c"+(_chartId++);
  _chartMeta[id]={type:"line",data,keys,colors,unit:unit||"",labels:labels||keys};
  const W=CHART_W,p=CHART_PAD;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const vals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const minV=Math.min(...vals)-3,maxV=Math.max(...vals)+3;
  const px=i=>p.l+i/(data.length-1||1)*cw;
  const py=v=>p.t+ch-(v-minV)/(maxV-minV||1)*ch;
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  const step=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{if(i%step===0)s+=`<line x1="${px(i)}" y1="${p.t}" x2="${px(i)}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;const v=Math.round(maxV-(maxV-minV)*i/3);
    s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;
    s+=`<text x="${p.l-3}" y="${y+3}" text-anchor="end" fill="#475569" font-size="9">${v}</text>`;}
  data.forEach((d,i)=>{if(i%step===0)s+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label}</text>`;});
  if(keys.includes('tsb')){const y0=py(0);s+=`<line x1="${p.l}" y1="${y0}" x2="${W-p.r}" y2="${y0}" stroke="#475569" stroke-dasharray="4" stroke-width="1"/>`;}
  keys.forEach((k,ki)=>{const pts=data.map((d,i)=>`${px(i)},${py(d[k]||0)}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="2"/>`;});
  return s+`</svg>`;
}

function svgBar(data,key,color,H=150,refVal=null,unit="",label="FTP"){
  const id="c"+(_chartId++);
  _chartMeta[id]={type:"bar",data,key,color,unit:unit||"",refVal,refLabel:label};
  const W=CHART_W,p=CHART_PAD;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const vals=data.map(d=>d[key]||0);
  const maxV=Math.max(...vals)*1.1||1;
  const bw=Math.max(6,cw/data.length-2);
  const lblStep=Math.max(1,Math.ceil(data.length/6));
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  data.forEach((d,i)=>{const cx=p.l+i*(cw/data.length)+(cw/data.length)/2;
    s+=`<line x1="${cx}" y1="${p.t}" x2="${cx}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;
    s+=`<text x="${p.l-3}" y="${y+3}" text-anchor="end" fill="#475569" font-size="9">${Math.round(maxV-maxV*i/3)}</text>`;}
  data.forEach((d,i)=>{
    const x=p.l+i*(cw/data.length)+(cw/data.length-bw)/2;
    const bh=((d[key]||0)/maxV)*ch;const y=p.t+ch-bh;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="2"/>`;
    if(i%lblStep===0)s+=`<text x="${x+bw/2}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label||d.d||""}</text>`;});
  if(refVal){const y=p.t+ch-(refVal/maxV)*ch;
    s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5"/>`;
    s+=`<text x="${W-p.r}" y="${y-3}" text-anchor="end" fill="#a78bfa" font-size="9">FTP</text>`;}
  return s+`</svg>`;
}

// ── CHART TOOLTIP (hover na PC / dotyk na mobilu) ──────────────────────────────
function chartTip(e){
  const svg=e.currentTarget;
  const meta=_chartMeta[svg.dataset.cid];
  if(!meta)return;
  if(e.pointerType==='mouse' && e.buttons===0 && e.type==='pointerdown')return;
  e.preventDefault();
  const rect=svg.getBoundingClientRect();
  const relX=(e.clientX-rect.left)/rect.width*CHART_W;
  const cw=CHART_W-CHART_PAD.l-CHART_PAD.r;
  let idx;
  if(meta.type==='line'||meta.type==='combo'){
    idx=Math.round((relX-CHART_PAD.l)/cw*(meta.data.length-1));
  }else{
    idx=Math.floor((relX-CHART_PAD.l)/(cw/meta.data.length));
  }
  idx=Math.max(0,Math.min(meta.data.length-1,idx));
  const d=meta.data[idx];
  let html;
  if(meta.type==='line'){
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||''}</div>`+
      meta.keys.map((k,i)=>`<div><span style="color:${meta.colors[i]}">●</span> ${(meta.labels[i]||k).toUpperCase()}: <b>${d[k]??0}</b>${meta.unit}</div>`).join('');
  }else if(meta.type==='combo'){
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||''}</div>`+
      (meta.metrics.length?meta.metrics.map(m=>`<div><span style="color:${m.color}">●</span> ${m.label}: <b>${Math.round(d[m.key]??0)}</b>${m.unit}</div>`).join(''):
      `<div style="color:#64748b">Zapni alespoň jednu metriku</div>`);
  }else{
    html=`<div style="font-weight:800;margin-bottom:3px;color:#94a3b8">${d.label||d.d||''}</div><div><span style="color:${meta.color}">●</span> <b>${d[meta.key]??0}</b>${meta.unit}</div>`+
      (meta.refVal?`<div style="color:#a78bfa">${meta.refLabel}: <b>${meta.refVal}</b>${meta.unit}</div>`:'');
  }
  const tip=document.getElementById('chart-tooltip');
  tip.innerHTML=html;
  tip.style.display='block';
  const tw=tip.offsetWidth||120,th=tip.offsetHeight||40;
  let left=e.clientX+14,top=e.clientY-th-14;
  if(left+tw>window.innerWidth-8)left=e.clientX-tw-14;
  if(left<8)left=8;
  if(top<8)top=e.clientY+14;
  if(top+th>window.innerHeight-8)top=window.innerHeight-th-8;
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}
function hideTip(){const tip=document.getElementById('chart-tooltip');if(tip)tip.style.display='none';}
document.addEventListener('pointerdown',e=>{if(!e.target.closest('svg[data-cid]'))hideTip();});

// ── ZOOM CHARTS — přiblížení konkrétního ROZSAHU DAT (jako na intervals.icu) ───
// Dva prsty od sebe/k sobě (nebo kolečko myši) zúží/rozšíří zobrazený úsek dat;
// osa X se vždy přepočítá jen pro aktuálně vybraný rozsah bodů.
const _zoomCfg={};   // zid -> {type,fullData,keys,colors,H,unit,labels,maxPoints}
const _zoomState={}; // zid -> {start,end} indexy do fullData

function decimate(arr,maxPoints){
  if(arr.length<=maxPoints)return arr;
  const k=Math.ceil(arr.length/maxPoints);
  return arr.filter((_,i)=>i%k===0);
}
function fmtRangeLabel(cfg,start,end){
  const n=end-start+1,full=cfg.fullData.length;
  if(n>=full)return `Celé období · ${full} bodů`;
  const a=cfg.fullData[start]?.label||"",b=cfg.fullData[end]?.label||"";
  return `${a} – ${b} · ${n} bodů`;
}
function renderZoomChart(zid){
  const cfg=_zoomCfg[zid],st=_zoomState[zid];
  const shown=decimate(cfg.fullData.slice(st.start,st.end+1),cfg.maxPoints);
  const svg=cfg.type==="combo"?svgCombo(shown,cfg):svgLine(shown,cfg.keys,cfg.colors,cfg.H,cfg.unit,cfg.labels);
  const el=document.getElementById("zc-"+zid);if(el)el.innerHTML=svg;
  const rl=document.getElementById("zr-"+zid);if(rl)rl.textContent=fmtRangeLabel(cfg,st.start,st.end);
}
function zoomWrapLine(fullData,keys,colors,H,unit,labels,zid,maxPoints=90){
  _zoomCfg[zid]={type:"line",fullData,keys,colors,H,unit,labels,maxPoints};
  if(!_zoomState[zid]||_zoomState[zid].end>=fullData.length)_zoomState[zid]={start:0,end:fullData.length-1};
  const st=_zoomState[zid];
  const svg=svgLine(decimate(fullData.slice(st.start,st.end+1),maxPoints),keys,colors,H,unit,labels);
  return `<div class="chart-zoom" data-zid="${zid}">
    <div id="zc-${zid}">${svg}</div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomStep('${zid}',0.6)">+</button>
      <button class="zoom-btn" onclick="zoomStep('${zid}',${(1/0.6).toFixed(4)})">−</button>
      <button class="zoom-btn" onclick="zoomResetRange('${zid}')" style="font-size:11px">⟲</button>
    </div>
    <div class="zoom-range" id="zr-${zid}">${fmtRangeLabel(_zoomCfg[zid],st.start,st.end)}</div>
  </div>`;
}
// ── KOMBINOVANÝ GRAF (výkon/TF/kadence/výška přeložené přes sebe, zapínatelné) ─
function svgCombo(data,cfg){
  const id="c"+(_chartId++);
  const metrics=cfg.metrics.filter(m=>cfg.active.has(m.key));
  _chartMeta[id]={type:"combo",data,metrics};
  const W=CHART_W,p=CHART_PAD,H=cfg.H||190;
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const px=i=>p.l+i/(data.length-1||1)*cw;
  const norm=(v,key)=>{const r=cfg.metricRange[key],range=(r.max-r.min)||1;return (v-r.min)/range;};
  const py=frac=>p.t+ch-frac*ch;
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block" data-cid="${id}" ${CHART_EVTS}>`;
  const step=Math.max(1,Math.floor(data.length/6));
  data.forEach((d,i)=>{if(i%step===0)s+=`<line x1="${px(i)}" y1="${p.t}" x2="${px(i)}" y2="${H-p.b}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;});
  for(let i=0;i<=3;i++){const y=p.t+i*ch/3;s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#334155" stroke-width="1" stroke-opacity="0.7"/>`;}
  data.forEach((d,i)=>{if(i%step===0)s+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${d.label}</text>`;});
  metrics.forEach(m=>{
    const pts=data.map((d,i)=>`${px(i)},${py(norm(d[m.key]||0,m.key))}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${m.color}" stroke-width="2"/>`;
  });
  if(!metrics.length)s+=`<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#475569" font-size="11">Zapni alespoň jednu metriku níže</text>`;
  return s+`</svg>`;
}
function comboWrapChart(fullData,metrics,zid,maxPoints=100){
  const metricRange={};
  metrics.forEach(m=>{const vals=fullData.map(d=>d[m.key]||0);metricRange[m.key]={min:Math.min(...vals),max:Math.max(...vals)};});
  const prevActive=_zoomCfg[zid]&&_zoomCfg[zid].active;
  const active=prevActive||new Set(metrics.map(m=>m.key));
  _zoomCfg[zid]={type:"combo",fullData,metrics,metricRange,H:190,maxPoints,active};
  if(!_zoomState[zid]||_zoomState[zid].end>=fullData.length)_zoomState[zid]={start:0,end:fullData.length-1};
  const st=_zoomState[zid];
  const svg=svgCombo(decimate(fullData.slice(st.start,st.end+1),maxPoints),_zoomCfg[zid]);
  const legend=metrics.map(m=>`<label style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${active.has(m.key)?m.color:"#475569"};margin-right:14px;margin-bottom:6px;cursor:pointer">
    <input type="checkbox" ${active.has(m.key)?"checked":""} onchange="toggleComboSeries('${zid}','${m.key}')" style="accent-color:${m.color};width:14px;height:14px">${m.label}
  </label>`).join("");
  return `<div id="combo-legend-${zid}" style="margin-bottom:6px">${legend}</div>
  <div class="chart-zoom" data-zid="${zid}">
    <div id="zc-${zid}">${svg}</div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomStep('${zid}',0.6)">+</button>
      <button class="zoom-btn" onclick="zoomStep('${zid}',${(1/0.6).toFixed(4)})">−</button>
      <button class="zoom-btn" onclick="zoomResetRange('${zid}')" style="font-size:11px">⟲</button>
    </div>
    <div class="zoom-range" id="zr-${zid}">${fmtRangeLabel(_zoomCfg[zid],st.start,st.end)}</div>
  </div>`;
}
function toggleComboSeries(zid,key){
  const cfg=_zoomCfg[zid];
  if(!cfg)return;
  if(cfg.active.has(key))cfg.active.delete(key);else cfg.active.add(key);
  renderZoomChart(zid);
  const m=cfg.metrics.find(x=>x.key===key);
  const lbl=event.currentTarget.closest("label");
  if(lbl&&m)lbl.style.color=cfg.active.has(key)?m.color:"#475569";
}
function setWindowRaw(zid,start,end){
  const cfg=_zoomCfg[zid],N=cfg.fullData.length;
  let L=Math.max(3,Math.min(N-1,end-start));
  let s=start,e=start+L;
  if(s<0){e-=s;s=0;}
  if(e>N-1){s-=(e-(N-1));e=N-1;}
  s=Math.max(0,Math.round(s));e=Math.min(N-1,Math.round(e));
  if(e<=s)e=Math.min(N-1,s+3);
  _zoomState[zid]={start:s,end:e};
  renderZoomChart(zid);
}
function zoomStep(zid,factor){
  const st=_zoomState[zid],mid=(st.start+st.end)/2,L=(st.end-st.start)*factor;
  setWindowRaw(zid,mid-L/2,mid+L/2);
}
function zoomResetRange(zid){
  const cfg=_zoomCfg[zid];
  _zoomState[zid]={start:0,end:cfg.fullData.length-1};
  renderZoomChart(zid);
}
function clientXToFrac(zid,clientX){
  const svgEl=document.querySelector(`#zc-${zid} svg`);
  if(!svgEl)return 0.5;
  const rect=svgEl.getBoundingClientRect();
  const p=CHART_PAD,W=CHART_W;
  const relX=(clientX-rect.left)/rect.width*W;
  return Math.max(0,Math.min(1,(relX-p.l)/(W-p.l-p.r)));
}
function screenXToIndex(zid,clientX){
  const st=_zoomState[zid];
  return st.start+clientXToFrac(zid,clientX)*(st.end-st.start);
}
function initChartZoom(){
  document.querySelectorAll(".chart-zoom").forEach(box=>{
    if(box._zoomInit)return;box._zoomInit=true;
    const zid=box.dataset.zid;
    const pts={};let pinch=null,pan=null;
    box.addEventListener("pointerdown",e=>{
      pts[e.pointerId]={x:e.clientX,y:e.clientY};
      const ids=Object.keys(pts);
      if(ids.length===2){
        pan=null;
        ids.forEach(id=>{try{box.setPointerCapture(Number(id));}catch(err){}});
        const p2=ids.map(id=>pts[id]);
        pinch={ia:screenXToIndex(zid,p2[0].x),ib:screenXToIndex(zid,p2[1].x)};
      }else if(ids.length===1){
        const st=_zoomState[zid],cfg=_zoomCfg[zid];
        if(st.end-st.start<cfg.fullData.length-1){
          try{box.setPointerCapture(e.pointerId);}catch(err){}
          pan={startAt:st.start,endAt:st.end,lastX:e.clientX};
        }
      }
    });
    box.addEventListener("pointermove",e=>{
      if(!pts[e.pointerId])return;
      pts[e.pointerId]={x:e.clientX,y:e.clientY};
      const ids=Object.keys(pts);
      if(ids.length===2&&pinch){
        const p2=ids.map(id=>pts[id]);
        const fracA=clientXToFrac(zid,p2[0].x),fracB=clientXToFrac(zid,p2[1].x);
        if(Math.abs(fracA-fracB)>0.02){
          const L=(pinch.ia-pinch.ib)/(fracA-fracB);
          const newStart=pinch.ia-fracA*L;
          setWindowRaw(zid,newStart,newStart+L);
        }
      }else if(ids.length===1&&pan){
        const svgEl=document.querySelector(`#zc-${zid} svg`);
        const rect=svgEl?svgEl.getBoundingClientRect():box.getBoundingClientRect();
        const p=CHART_PAD,W=CHART_W;
        const plotFracW=(W-p.l-p.r)/W;
        const L=pan.endAt-pan.startAt;
        const dx=e.clientX-pan.lastX;
        const idxDelta=-(dx/rect.width)*(L/plotFracW);
        setWindowRaw(zid,pan.startAt+idxDelta,pan.endAt+idxDelta);
      }
    });
    const endPtr=e=>{
      delete pts[e.pointerId];
      const ids=Object.keys(pts);
      pinch=null;
      if(ids.length===1){
        const st=_zoomState[zid],cfg=_zoomCfg[zid];
        pan=(st.end-st.start<cfg.fullData.length-1)?{startAt:st.start,endAt:st.end,lastX:pts[ids[0]].x}:null;
      }else pan=null;
    };
    box.addEventListener("pointerup",endPtr);
    box.addEventListener("pointercancel",endPtr);
    box.addEventListener("pointerleave",e=>{if(Object.keys(pts).length<2)endPtr(e);});
    box.addEventListener("wheel",e=>{
      e.preventDefault();
      const st=_zoomState[zid];
      const anchorIdx=screenXToIndex(zid,e.clientX);
      const frac=clientXToFrac(zid,e.clientX);
      const factor=e.deltaY<0?0.8:1.25;
      const L=(st.end-st.start)*factor;
      const newStart=anchorIdx-frac*L;
      setWindowRaw(zid,newStart,newStart+L);
    },{passive:false});
  });
}

  const ftp=getCurrentFtp(),zones=getZones(ftp),mx=Math.round(ftp*1.5);
  const topW=RIDES.filter(r=>r.watts>0).map(r=>r.watts);
  const best=topW.length?Math.max(...topW):ftp;
  const zonesHTML=zones.map(z=>{
    const left=(z.min/mx)*100;
    const w=((Math.min(z.max===9999?mx:z.max,mx)/mx)*100)-left;
    return `<div class="bar-wrap">

  const peaks=computeAutoFtpPeaks();
  return `
  ${renderSimBanner()}
  ${renderPowerCurveTable()}
  <div class="card">

    <div style="font-size:11px;color:#64748b;margin:2px 0 8px">Detekováno jen z jízd, které v názvu odpovídají klíčovým slovům pro FTP test (nastavíš v Adminu) + případné ruční záznamy. Běžné jízdy se nepočítají.</div>
    <div style="margin-top:6px">
      ${peaks.map((e,i,arr)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:${i<arr.length-1?"1px solid #334155":"none"}">

        <div style="font-size:18px;font-weight:800;color:#a78bfa">${e.refined?"":"≈"}${e.f}W</div>
        ${i>0?`<div style="font-size:11px;font-weight:700;color:${e.f-arr[i-1].f>=0?"#34d399":"#ef4444"}">${e.f-arr[i-1].f>=0?"+":""}${e.f-arr[i-1].f}W</div>`:""}
      </div>`).join("")||`<div style="font-size:12px;color:#64748b;text-align:center;padding:10px">Zatím žádný detekovaný test. Jízda musí mít v názvu klíčové slovo (viz Admin) a naměřený výkon. Zkontroluj klíčová slova nebo přidej ruční záznam v Adminu.</div>`}

function renderJizdy(){
  if(!RIDES.length)return noData();
  const shown=Math.min(jizdyShown,RIDES.length);
  return renderSimBanner()+
  `<div style="font-size:12px;color:#64748b;margin-bottom:8px" id="jizdy-count">Zobrazeno ${shown} z ${RIDES.length} jízd · klikni pro detail</div>`+
  `<div id="jizdy-list">${RIDES.slice(0,shown).map(renderRideCard).join("")}</div>`+
  jizdyFooterHTML(shown);

// Scroll-triggered load: appends only the new batch of cards, doesn't touch existing DOM nodes
function loadMoreJizdy(){
  if(jizdyShown>=RIDES.length)return;
  const prevShown=jizdyShown;
  jizdyShown=Math.min(jizdyShown+30,RIDES.length);
  if(currentTab!=="jizdy")return;
  const list=document.getElementById("jizdy-list");
  const oldSentinel=document.getElementById("jizdy-sentinel");
  if(!list){document.getElementById("content").innerHTML=renderJizdy();initJizdyScroll();return;}
  const newCardsHTML=RIDES.slice(prevShown,jizdyShown).map(renderRideCard).join("");
  list.insertAdjacentHTML("beforeend",newCardsHTML);
  if(oldSentinel)oldSentinel.outerHTML=jizdyFooterHTML(jizdyShown);
  const countEl=document.getElementById("jizdy-count");
  if(countEl)countEl.textContent=`Zobrazeno ${jizdyShown} z ${RIDES.length} jízd · klikni pro detail`;
  initJizdyScroll();
}

function initJizdyScroll(){
  const sentinel=document.getElementById("jizdy-sentinel");
  if(jizdyObserver){jizdyObserver.disconnect();jizdyObserver=null;}
  if(!sentinel)return;
  jizdyObserver=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting)loadMoreJizdy();
  },{root:null,rootMargin:"300px"});
  jizdyObserver.observe(sentinel);
}

function toggleRide(id){
  selRide=selRide===id?null:id;
  if(currentTab!=="jizdy")return;

async function addToAI(id,name,date,watts,hr,tss,km){
  let entry=aiRideCtx.find(r=>r.id===id);
  if(!entry){entry={id,name,date,watts,hr,tss,km,structure:null};aiRideCtx.push(entry);}
  showTab("ai");
  setTimeout(renderAICtx,100);

  // pokus se automaticky stáhnout detail jízdy a rozpoznat její strukturu (intervaly),
  // aby AI trenér mohl posoudit i provedení jednotlivých úseků, ne jen průměry
  if(entry.structure===null){
    entry.structure="loading";
    setTimeout(renderAICtx,100);
    try{
      let sd=getRideStreams(id);
      if(!sd){
        const token=await getToken();
        if(token){
          sd=await fetchRideStreamsFromStrava(token,{id});
          if(sd)saveRideStreams(id,sd);
        }
      }
      const stats=sd?detectRideStructure(sd,getCurrentFtp()):null;
      entry.structure=stats?summarizeRideStructure(stats,getCurrentFtp()):"";

      entry.structure="";

}

// ── DETAIL JÍZDY (časová osa, výkon/TF/kadence/výška, zóny, best efforty) ──────
function fmtClock(totalSec){
  totalSec=Math.max(0,Math.round(totalSec||0));
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=totalSec%60;
  return h>0?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;
}
function getRideStreams(id){return rideStreamsCache[id]||null;}
function trimRideStreamsCache(){
  const keys=Object.keys(rideStreamsCache);
  if(keys.length>60){keys.slice(0,keys.length-40).forEach(k=>delete rideStreamsCache[k]);}
}
function saveRideStreams(id,data){
  rideStreamsCache[id]=data;
  try{localStorage.setItem("cyc_ride_streams",JSON.stringify(rideStreamsCache));}
  catch(e){trimRideStreamsCache();try{localStorage.setItem("cyc_ride_streams",JSON.stringify(rideStreamsCache));}catch(e2){}}
}
async function fetchRideStreamsFromStrava(token,ride){
  const url=`https://www.strava.com/api/v3/activities/${ride.id}/streams?keys=time,watts,heartrate,cadence,altitude&key_by_type=true&resolution=medium`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(res.status===429){const err=new Error("rate_limited");err.rateLimited=true;throw err;}
  if(!res.ok)return null;
  const d=await res.json();
  const pick=k=>d[k]&&d[k].data?d[k].data:null;
  const time=pick("time");
  if(!time||!time.length)return null;
  return {t:time,w:pick("watts"),hr:pick("heartrate"),cad:pick("cadence"),alt:pick("altitude"),fetchedAt:Date.now()};
}
function buildStreamSeries(sd){
  const t=sd.t||[],n=t.length;
  const w=sd.w||[],hr=sd.hr||[],cad=sd.cad||[],alt=sd.alt||[];
  const arr=new Array(n);
  for(let i=0;i<n;i++)arr[i]={label:fmtClock(t[i]),t:t[i],w:w[i]||0,hr:hr[i]||0,cad:cad[i]||0,alt:alt[i]||0};
  return arr;
}
// ── AUTOMATICKÁ DETEKCE STRUKTURY JÍZDY (pro AI analýzu) ────────────────────────
// Z power/TF/kadence streamu rozpozná úseky (rozcvička, intervaly, odpočinky,
// vyjetí) podle zón odvozených z FTP a poskládá je do čitelného textového shrnutí,
// které se pak posílá AI trenérovi jako kontext k analýze provedení tréninku.
function fmtMinSec(sec){
  sec=Math.max(0,Math.round(sec));
  const m=Math.floor(sec/60),s=sec%60;
  return s>0?`${m}:${String(s).padStart(2,"0")}`:`${m}min`;
}
function smoothArr(arr,windowSec,dt){
  const win=Math.max(1,Math.round(windowSec/(dt||1)));
  const out=new Array(arr.length);
  let sum=0;
  for(let i=0;i<arr.length;i++){
    sum+=arr[i]||0;
    if(i>=win)sum-=arr[i-win]||0;
    out[i]=sum/Math.min(i+1,win);
  }
  return out;
}
function detectRideStructure(sd,ftp){
  const t=sd.t||[],wRaw=sd.w||[];
  const n=t.length;
  if(n<10||!wRaw.length)return null;
  const hr=sd.hr||[],cad=sd.cad||[];
  const dt=(t[n-1]-t[0])/(n-1||1)||1;
  // krátké vyhlazení (8s) — stačí odfiltrovat GPS/power meter šum (pár sekund),
  // ale zachová i krátké 15-30s mikro-bursty (VO2max/anaerobní/Lactate Shuttle)
  const smoothed=smoothArr(wRaw.map(x=>x||0),8,dt);
  const zones=getZones(ftp||getCurrentFtp());
  const zi=smoothed.map(v=>{const idx=zones.findIndex(z=>v>=z.min&&v<z.max);return idx<0?zones.length-1:idx;});
  // rozděl na hrubé úseky podle zóny
  let segs=[];let curZ=zi[0],segStart=0;
  for(let i=1;i<=n;i++){
    if(i===n||zi[i]!==curZ){
      segs.push({startI:segStart,endI:i-1,zone:curZ});
      if(i<n){curZ=zi[i];segStart=i;}
    }
  }
  // sluč krátké/šumové úseky se sousedním delším úsekem — práh je ZÓNOVĚ ZÁVISLÝ:
  // Z1-Z4 mají vyšší práh (90s), protože krátké výkyvy tam bývají terénní šum (kopec, refýlek);
  // Z5 VO2max a Z6 Anaerobní mají nízký práh (12s), protože skutečné mikro-bursty (Lactate Shuttle,
  // krátké VO2max špičky) jsou záměrně krátké a nechceme je smazat/rozředit do sousední zóny
  const minSegSecFor=zoneIdx=>zoneIdx>=4?12:90;
  let guard=0;const guardMax=segs.length*2+50;
  while(guard++<guardMax){
    let idx=segs.findIndex(s=>((t[s.endI]-t[s.startI])+dt)<minSegSecFor(s.zone));
    if(idx<0||segs.length<=1)break;
    if(idx===0){segs[1].startI=segs[0].startI;segs.splice(0,1);}
    else{segs[idx-1].endI=segs[idx].endI;segs.splice(idx,1);}
  }
  const zonesRef=zones;
  const stats=segs.map(s=>{
    let sw=0,shr=0,scad=0,hrc=0,cadc=0,cnt=0;
    for(let i=s.startI;i<=s.endI;i++){sw+=wRaw[i]||0;cnt++;if(hr[i]){shr+=hr[i];hrc++;}if(cad[i]&&cad[i]>20){scad+=cad[i];cadc++;}}
    const avgW=Math.round(sw/(cnt||1));
    // zóna se POČÍTÁ ZNOVA ze skutečného průměrného výkonu tohoto (už sloučeného) úseku —
    // dřívější zděděná zóna z merge kroku výše mohla neodpovídat reálnému průměru po sloučení
    // (to způsobovalo nesmysly typu "74% FTP, Z6-Anaerobní")
    const zIdx=zonesRef.findIndex(zz=>avgW>=zz.min&&avgW<zz.max);
    const z=zonesRef[zIdx<0?zonesRef.length-1:zIdx];
    return {
      durSec:Math.round((t[s.endI]-t[s.startI])+dt),
      avgW, avgHR:hrc?Math.round(shr/hrc):null, avgCad:cadc?Math.round(scad/cadc):null,
      zone:z.z, zoneName:z.n, pctFtp:ftp?Math.round(avgW/ftp*100):null
    };
  });
  return stats;
}
function summarizeRideStructure(stats,ftp){
  if(!stats||!stats.length)return "";
  const lines=[];let i=0;
  while(i<stats.length){
    const cur=stats[i];
    if(i+1<stats.length){
      const rest=stats[i+1];
      let reps=1,j=i+2;
      while(j+1<stats.length &&
        Math.abs(stats[j].durSec-cur.durSec)/cur.durSec<0.3 && stats[j].zone===cur.zone &&
        Math.abs(stats[j+1].durSec-rest.durSec)/Math.max(rest.durSec,1)<0.4 && stats[j+1].zone===rest.zone){
        reps++;j+=2;
      }
      if(j<stats.length && Math.abs(stats[j].durSec-cur.durSec)/cur.durSec<0.3 && stats[j].zone===cur.zone){reps++;j+=1;}
      if(reps>=2 && cur.zone!=="Z1" && cur.zone!=="Z2"){
        lines.push(`${reps}x ${fmtMinSec(cur.durSec)} @ ~${cur.avgW}W (${cur.pctFtp!=null?cur.pctFtp+"% FTP, ":""}${cur.zone}-${cur.zoneName})${cur.avgHR?`, TF ~${cur.avgHR}bpm`:""}${cur.avgCad?`, kadence ~${cur.avgCad}`:""} · odpočinek ${fmtMinSec(rest.durSec)} @ ~${rest.avgW}W (${rest.zone})`);
        i=j;continue;
      }
    }
    const label=i===0?"Rozcvička":(i===stats.length-1?"Závěr/vyjetí":"Úsek");
    lines.push(`${label}: ${fmtMinSec(cur.durSec)} @ ${cur.avgW}W (${cur.pctFtp!=null?cur.pctFtp+"% FTP, ":""}${cur.zone}-${cur.zoneName})${cur.avgHR?`, TF ${cur.avgHR}bpm`:""}${cur.avgCad?`, kadence ${cur.avgCad}`:""}`);
    i++;
  }
  // pokud je úseků moc (nestrukturovaná/terénní jízda), radši shrň jen rozložení podle zón
  if(lines.length>18){
    const total=stats.reduce((a,s)=>a+s.durSec,0)||1;
    const byZone={};
    stats.forEach(s=>{byZone[s.zone]=(byZone[s.zone]||0)+s.durSec;});
    const zoneNames={Z1:"Regenerace",Z2:"Aerobní",Z3:"Tempo",Z4:"Práh/SST",Z5:"VO2max",Z6:"Anaerobní"};
    const pctLine=Object.keys(zoneNames).filter(z=>byZone[z]).map(z=>`${z} ${zoneNames[z]} ${Math.round(byZone[z]/total*100)}%`).join(", ");
    return `Jízda nemá jasně opakovanou intervalovou strukturu (spíš vytrvalostní/terénní ráz), rozložení podle zón: ${pctLine}.`;
  }
  return lines.join("\n");
}
// ── NÁZEV JÍZDY JAKO NÁPOVĚDA ZÁMĚRU (doplněk k detekci ze streamu) ─────────────
// Strava/Zwift generují název jízdy automaticky ("Morning Ride" apod.) pro volné vyjížďky.
// Pokud sportovec (nebo AI trenér) do názvu dá typ tréninku (SST 3x20, VO2max 5x4, Závod...),
// použijeme to jako nápovědu ZÁMĚRU pro AI hodnocení — detekce struktury ze streamu pak
// nezávisle ověří, jak se záměr reálně povedl splnit. Jedno bez druhého nestačí:
// název bez ověření provedení by AI jen slepě opakovala, detekce bez záměru nepozná "proč".
//
// KONVENCE PRO PÁROVÁNÍ S TÝDENNÍM PLÁNEM: pokud název jízdy začíná "D<1-7>" nebo "Den <1-7>"
// (např. "D3 VO2max 5x4" nebo "Den 3 VO2max 5x4"), appka si podle toho SAMA spáruje jízdu
// s příslušným dnem v Tréninky, označí ho jako splněný a použije skutečnou délku/watty.
// Tag se před klasifikací záměru odstraní, aby nerušil rozpoznání typu tréninku.
const DAY_TAG_RE=/^\s*(?:d|den)\s*([1-7])(?![0-9])[\s:.\-–—]*/i;
function extractRideDayTag(name){
  const m=(name||"").match(DAY_TAG_RE);
  return m?parseInt(m[1],10):null;
}
function stripDayTag(name){
  return (name||"").replace(DAY_TAG_RE,"").trim();
}
const GENERIC_RIDE_NAME_RE=/^(early morning|morning|lunch|afternoon|evening|night)\s+ride$/i;
const RACE_RIDE_NAME_RE=/závod|race\b/i;
function classifyRideName(name){
  const n=stripDayTag(name);
  if(!n||GENERIC_RIDE_NAME_RE.test(n))return{type:"generic"};
  if(RACE_RIDE_NAME_RE.test(n))return{type:"race",label:n};
  return{type:"structured",label:n};
}
function rideNameHint(name){
  const c=classifyRideName(name);
  if(c.type==="generic")return "Automaticky generovaný název jízdy (bez konkrétního záměru) — hodnoť jako obecnou/volnou vyjížďku, neočekávej striktní intervalovou strukturu.";
  if(c.type==="race")return `Název naznačuje ZÁVOD ("${c.label}") — hodnoť jinak než trénink: zaměř se na peak power, pacing a taktiku, ne na dodržení tréninkových zón.`;
  return `Název naznačuje ZAMÝŠLENÝ typ tréninku: "${c.label}" — ověř, zda se shoduje s detekovanou strukturou a wattami níže; pokud ne, výslovně to okomentuj jako nesoulad mezi plánem a provedením.`;
}
function calcNP(wArr,dt){
  if(!wArr||!wArr.length)return 0;
  const winN=Math.max(1,Math.round(30/(dt||1)));
  let sum=0,sumQ=0;
  for(let i=0;i<wArr.length;i++){
    sum+=wArr[i];
    if(i>=winN)sum-=wArr[i-winN];
    const cnt=Math.min(i+1,winN);
    const avg=sum/cnt;
    sumQ+=Math.pow(avg,4);
  }
  return Math.round(Math.pow(sumQ/wArr.length,0.25));
}
function calcZoneTime(wArr,dt,ftp){
  const zones=getZones(ftp||getCurrentFtp());
  const secs=zones.map(()=>0);
  wArr.forEach(w=>{
    let idx=zones.findIndex(z=>w>=z.min&&w<z.max);
    if(idx<0)idx=zones.length-1;
    secs[idx]+=(dt||1);
  });
  const total=secs.reduce((a,b)=>a+b,0)||1;
  return zones.map((z,i)=>({...z,sec:secs[i],pct:Math.round(secs[i]/total*100)}));
}
function calcBestEfforts(id,wArr,dt,durationSec){
  const cached=pcCache()[id];
  return PC_DURATIONS.filter(pd=>Number(pd.k)<=durationSec+5).map(pd=>{
    if(cached&&cached[pd.k])return {l:pd.l,v:cached[pd.k]};
    const n=Math.max(1,Math.round(Number(pd.k)/(dt||1)));
    return {l:pd.l,v:Math.round(maxAvgWindow(wArr,n))};
  });
}

async function openRideDetail(id){
  detailRideId=id;
  const r=RIDES.find(x=>x.id===id);
  if(!r)return;
  const content=document.getElementById("content");
  content.innerHTML=renderRideDetailShell(r,"⏳ Načítám detailní data z Strava…");
  window.scrollTo(0,0);
  let sd=getRideStreams(id);
  if(!sd){
    const token=await getToken();
    if(!token){content.innerHTML=renderRideDetailShell(r,"❌ Přihlas se přes Strava v sekci Admin pro stažení detailu.");return;}
    try{
      sd=await fetchRideStreamsFromStrava(token,r);
      if(sd)saveRideStreams(id,sd);
    }catch(e){
      if(e&&e.rateLimited){content.innerHTML=renderRideDetailShell(r,"⚠️ Strava API dočasně omezilo počet požadavků. Zkus to za pár minut.");return;}
      content.innerHTML=renderRideDetailShell(r,"❌ Nepodařilo se stáhnout detail jízdy.");return;
    }
  }
  if(!sd){content.innerHTML=renderRideDetailShell(r,"🔶 Pro tuto jízdu nejsou k dispozici detailní data (chybí senzor nebo je Strava nemá).");return;}
  if(detailRideId!==id)return; // uživatel mezitím odešel z detailu
  content.innerHTML=renderRideDetail(r,sd);
  initChartZoom();
}

function cleanAIText(text){
  // levný model občas vyplivne náhodný cizí znak (CJK) uprostřed české věty – ořízneme
  return String(text).replace(/[\u4e00-\u9fff\u3040-\u30ff\uac00-\ud7af]/g,"").replace(/\r/g,"");
}
function mdBold(line){return line.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");}

function extractWorkouts(text){
  text=String(text);
  const startMarker="===WORKOUTS_JSON===", endMarker="===END_WORKOUTS_JSON===";
  const startIdx=text.indexOf(startMarker);
  if(startIdx===-1) return {text, workouts:null, truncated:false};
  const endIdx=text.indexOf(endMarker);
  const truncated=(endIdx===-1);
  const before=text.slice(0,startIdx);
  const after=truncated?"":text.slice(endIdx+endMarker.length);
  const cleanText=(before+"\n"+after).trim();
  const jsonStr=(!truncated
    ? text.slice(startIdx+startMarker.length,endIdx)
    : text.slice(startIdx+startMarker.length)
  ).trim();
  try{
    const parsed=JSON.parse(jsonStr);
    const withIds=parsed.map((w,i)=>({id:"w_"+Date.now()+"_"+i, createdAt:new Date().toISOString(), ...w}));
    return {text:cleanText, workouts:withIds, truncated};
  }catch(e){
    // odpověď byla pravděpodobně oříznutá (max_tokens v Workeru) — zkus zachránit aspoň kompletní tréninky ze začátku pole
    const salvaged=salvageTruncatedWorkoutsJson(jsonStr);
    return {text:cleanText, workouts:(salvaged&&salvaged.length)
      ? salvaged.map((w,i)=>({id:"w_"+Date.now()+"_"+i, createdAt:new Date().toISOString(), ...w}))
      : null, truncated};
  }
}

function salvageTruncatedWorkoutsJson(str){
  // najde poslední uzavřený objekt tréninku v poli a zkusí ho parsovat jako platné (uzavřené) pole
  const lastComplete=str.lastIndexOf("},");
  if(lastComplete===-1)return null;
  try{
    const parsed=JSON.parse(str.slice(0,lastComplete+1)+"]");
    return Array.isArray(parsed)?parsed:null;
  }catch(e){return null;}
}

function renderPlanOutput(text) {
  text=cleanAIText(text);
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l.length);
  let html='<div style="margin-top:4px">';
  lines.forEach(line=>{
    const headingMatch=line.match(/^\*\*(.+?)\*\*:?\s*$/);
    const dayMatch=line.match(/^\d+[\.\)]\s*\*\*(.+?)\*\*:?\s*(.*)$/);
    const boldBulletMatch=line.match(/^[*\-]\s*\*\*(.+?)\*\*:?\s*(.*)$/);
    const plainBulletMatch=line.match(/^[*\-]\s+(.*)$/);
    if(headingMatch){
      const title=headingMatch[1].replace(/:$/,"");
      const low=title.toLowerCase();
      let icon="📌",color="#94a3b8";
      if(low.includes("stav")){icon="📊";color="#38bdf8";}
      else if(low.includes("doporuč")||low.includes("plán")||low.includes("týden")){icon="📅";color="#34d399";}
      else if(low.includes("pozor")||low.includes("varov")||low.includes("riziko")){icon="⚠️";color="#ef4444";}
      else if(low.includes("priorit")||low.includes("cíl")){icon="🎯";color="#fbbf24";}
      html+=`<div style="display:flex;align-items:center;gap:6px;margin:16px 0 8px;font-size:12px;font-weight:800;color:${color};text-transform:uppercase;letter-spacing:.3px">${icon} ${title}</div>`;
    } else if(dayMatch || boldBulletMatch){
      const m=dayMatch||boldBulletMatch;
      const label=m[1];
      const rest=mdBold(m[2]);
      html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-left:3px solid #38bdf8;border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:800;color:#38bdf8;margin-bottom:4px">📌 ${label}</div>
        <div style="font-size:12px;color:#cbd5e1;line-height:1.6">${rest}</div>
      </div>`;
    } else if(plainBulletMatch){
      html+=`<div style="display:flex;gap:8px;font-size:12px;color:#e2e8f0;line-height:1.6;padding:2px 0 2px 4px"><span style="color:#64748b">•</span><span>${mdBold(plainBulletMatch[1])}</span></div>`;
    } else {
      html+=`<div style="font-size:12px;color:#e2e8f0;line-height:1.7;padding:2px 0">${mdBold(line)}</div>`;
    }
  });
  html+="</div>";
  return html;
}

// Bezpečné formátování LOKÁLNÍHO data na "YYYY-MM-DD" — NIKDY nepoužívej .toISOString()
// pro tohle: ta vždy převádí na UTC, a v letním čase (UTC+2) by to posunulo půlnoc
// o den zpátky (např. pondělí 20.7. 00:00 náš čas = 19.7. 22:00 UTC → špatné datum).
function localISODate(dt){
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}
function addDaysLocal(isoDate,days){
  const [y,m,d]=isoDate.split("-").map(Number);
  return localISODate(new Date(y,m-1,d+days));
}
function mondayOfWeek(d){
  const date=new Date(d);
  const day=date.getDay(); // 0=neděle,1=pondělí,...,6=sobota
  const diff=(day===0?-6:1-day); // kolik dní přičíst/odečíst, aby vyšlo pondělí téhož týdne
  return localISODate(new Date(date.getFullYear(),date.getMonth(),date.getDate()+diff));
}
function ensurePlanDates(){
  // doplní chybějící "date" pole u starších plánů (vytvořených před touto úpravou)
  if(!planWeekStart)return false;
  let changed=false;
  TRAINING_PLANS.forEach(w=>{
    if(!w.date&&w.day_number){
      w.date=addDaysLocal(planWeekStart,w.day_number-1);
      changed=true;
    }
  });
  if(changed)localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
  return changed;
}
function stampPlanDates(workouts,weekStartISO){
  return workouts.map(w=>({...w,date:addDaysLocal(weekStartISO,(w.day_number||1)-1)}));
}
function todayDayNumber(){
  const todayISO=localISODate(new Date());
  ensurePlanDates();
  const found=TRAINING_PLANS.find(w=>w.date===todayISO);
  if(found)return found.day_number;
  if(!planWeekStart)return null;
  const [y,m,d]=planWeekStart.split("-").map(Number);
  const start=new Date(y,m-1,d);
  const now=new Date();
  const nowLocal=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((nowLocal-start)/86400000)+1;
}

function setPlanWeekStart(dateStr){
  if(!dateStr||!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))return;
  planWeekStart=dateStr;
  localStorage.setItem("cyc_plan_week_start",planWeekStart);
  TRAINING_PLANS=TRAINING_PLANS.map(w=>({...w,date:w.day_number?addDaysLocal(planWeekStart,w.day_number-1):w.date}));
  localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
  syncToCloud();
  checkRideMatches();
}

// ── TRÉNINKY (strukturované workouty od trenéra) ───────────────────────────────
function plannedAvgWatts(w){
  if(!w.phases||!w.phases.length)return null;
  const ftp=getCurrentFtp();
  let totalW=0,totalMin=0;
  w.phases.forEach(p=>{
    const nums=(String(p.ftp_pct||"").match(/\d+(\.\d+)?/g)||[]).map(Number);
    if(!nums.length||!p.duration_min)return;
    const pct=nums.length===1?nums[0]:(nums[0]+nums[1])/2;
    totalW+=(pct/100*ftp)*p.duration_min;
    totalMin+=p.duration_min;
  });
  return totalMin?Math.round(totalW/totalMin):null;
}
function ftpPctToWatts(pctStr){
  const ftp=getCurrentFtp();
  const nums=(String(pctStr).match(/\d+(\.\d+)?/g)||[]).map(Number);
  if(!nums.length) return "";
  if(nums.length===1) return `${Math.round(ftp*nums[0]/100)}W`;
  return `${Math.round(ftp*nums[0]/100)}–${Math.round(ftp*nums[1]/100)}W`;
}

// ── AUTOMATICKÉ PÁROVÁNÍ JÍZD S TÝDENNÍM PLÁNEM ─────────────────────────────────
// Primárně podle SKUTEČNÉHO DATA daného dne v plánu (jednoznačné, žádný drift).
// "D<n>"/"Den n" tag v názvu jízdy slouží jen jako pojistka pro rozlišení, pokud by
// ve stejný den bylo víc jízd (pak bez tagu radši nehádáme a necháme nespárováno).
function checkRideMatches(){
  const changed=autoMatchCompletedRides();
  showTab("treninky");
  const nonRest=TRAINING_PLANS.filter(w=>!(w.type==="rest"||/volno|regenerace/i.test(w.title||"")));
  const completedCount=nonRest.filter(w=>w.completed).length;
  if(changed){
    alert(`✅ Aktualizováno — ${completedCount}/${nonRest.length} tréninkových dnů je teď označeno jako splněno.`);
  }else{
    alert(`Žádné nové shody nenalezeny (aktuálně ${completedCount}/${nonRest.length} splněno).\n\nMožné důvody:\n• Jízda ještě nebyla stažená ze Strava — zkus v Admin "🔄 Rychlá aktualizace"\n• Datum jízdy na Stravě neodpovídá datu daného dne v plánu (vidíš ho v závorce u každé karty)\n• Ve stejný den je jízd víc a žádná (nebo víc než jedna) nemá na začátku názvu tag "D<číslo dne>"`);
  }
}
function autoMatchCompletedRides(){
  if(!TRAINING_PLANS.length)return false;
  ensurePlanDates();
  let changed=false;
  TRAINING_PLANS.forEach(w=>{
    const isRest=w.type==="rest"||/volno|regenerace/i.test(w.title||"");
    if(isRest||!w.date)return;
    const sameDate=RIDES.filter(r=>r.date===w.date);
    let match=null;
    if(sameDate.length===1){
      match=sameDate[0];
    }else if(sameDate.length>1){
      const tagged=sameDate.filter(r=>extractRideDayTag(r.name)===w.day_number);
      if(tagged.length===1)match=tagged[0]; // víc jízd ten den, ale jen jedna nese správný tag → jednoznačné
      // jinak (0 nebo 2+ shod s tagem) radši nehádáme, necháme na ručním zaškrtnutí
    }
    if(match){
      const durMin=Math.round((match.dur||0)/60);
      if(!w.completed||w.actualRideId!==match.id||w.actualDurationMin!==durMin||w.actualAvgW!==match.watts){
        w.completed=true;
        w.actualRideId=match.id;
        w.actualDurationMin=durMin;
        w.actualAvgW=match.watts;
        changed=true;
      }
    }
  });
  if(changed){
    localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
    syncToCloud();
  }
  return changed;
}
function typeColor(type){
  const t=(type||"").toLowerCase();
  if(t.includes("vo2")) return "#ef4444";
  if(t.includes("sst")||t.includes("sweet")) return "#fbbf24";
  if(t.includes("thresh")) return "#fb923c";
  if(t.includes("rest")||t.includes("volno")||t.includes("recover")||t.includes("regen")) return "#34d399";

function toggleWorkout(id){
  const el=document.getElementById("wk-"+id);
  if(el)el.classList.toggle("open");
}

function toggleCompleted(id){
  const w=TRAINING_PLANS.find(x=>x.id===id);
  if(!w)return;
  w.completed=!w.completed;
  localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
  syncToCloud();
  showTab("treninky");
}

function startSwap(id){
  swapSourceId=(swapSourceId===id)?null:id;
  showTab("treninky");
}

function cardClick(id){
  if(swapSourceId){
    if(swapSourceId!==id){
      const a=TRAINING_PLANS.find(x=>x.id===swapSourceId);
      const b=TRAINING_PLANS.find(x=>x.id===id);
      if(a&&b){
        const keys=["title","type","duration_min","phases","setup_tip"];
        const tmp={};keys.forEach(k=>tmp[k]=a[k]);
        keys.forEach(k=>a[k]=b[k]);
        keys.forEach(k=>b[k]=tmp[k]);
        // completed/actualní data se NEpřesouvají s obsahem — patří k pevnému datu daného
        // dne, tak je po přehození obsahu přepočítáme znovu podle skutečných jízd na ta data
        a.completed=false;a.actualRideId=null;a.actualDurationMin=null;a.actualAvgW=null;
        b.completed=false;b.actualRideId=null;b.actualDurationMin=null;b.actualAvgW=null;
        localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
        autoMatchCompletedRides();
        syncToCloud();
      }
    }
    swapSourceId=null;
    showTab("treninky");
  }else{
    toggleWorkout(id);
  }
}

function deleteWorkout(id){
  TRAINING_PLANS=TRAINING_PLANS.filter(w=>w.id!==id);
  localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
  syncToCloud();
  showTab("treninky");
}

function clearAllWorkouts(){
  if(!confirm("Smazat všechny uložené tréninky?"))return;
  TRAINING_PLANS=[];
  localStorage.setItem("cyc_workouts",JSON.stringify(TRAINING_PLANS));
  syncToCloud();
  showTab("treninky");
}

1. Krátké shrnutí aktuální formy a strategie tohoto týdne (3-4 věty) — na základě čeho jsi plán takto sestavil (CTL/ATL/TSB, cíl, časová kapacita)
2. Přehled dní jako seznam "Den 1" až "Den 7"${updateFromDay?` (dny 1 až ${updateFromDay-1} jen zopakuj beze změny z dat od uživatele, u dnů ${updateFromDay}-7 popiš aktualizovaný obsah)`:""}, u KAŽDÉHO dne JEDNA krátká věta s typem a účelem tréninku (např. "Den 1 – SST blok, budování FTP" nebo "Den 2 – volno, regenerace po SST") — BEZ wattů, délek, počtu intervalů (ty jen v JSON). Při sestavování ${updateFromDay?`zbývajících dnů (Den ${updateFromDay} až 7)`:"dnů"} dodržuj: nikdy dva těžké intervalové dny za sebou bez rozestupu (pokud to fyziologie nevyžaduje jinak); CÍLOVÝ součet tréninkových hodin ${updateFromDay?`ZBÝVAJÍCÍ do konce týdne`:"za týden"} je ${effWh}h — sportovec tuto kapacitu zadal záměrně, plánuj ji tedy VYUŽÍT (typicky 85-100 % z ${effWh}h, tj. ${(effWh*0.85).toFixed(1)}-${effWh}h), ne jen "neprekročit" a naplánovat výrazně méně. Nižší objem než tento cíl zvol POUZE pokud je to fyziologicky odůvodněné (nízké TSB, riziko přetrénování, deload týden) — a v tom případě to explicitně napiš a zdůvodni v bodě 3 níže. NEPOUŽÍVEJ konkrétní názvy všedních dnů (pondělí, úterý...) — jen "Den 1"–"Den 7". Skladba a formáty tréninků se MUSÍ odvíjet od časové kapacity, aktuální formy (CTL/ATL/TSB) a cíle — nepoužívej mechanicky stejnou skladbu týden co týden ani nezávisle na objemu. Inspiruj se běžnými formáty používanými v etablovaných platformách/metodikách (TrainerRoad, Zwift, Wahoo SYSTM, Coggan power-based training, Seiler polarized model) i variabilitou typů (SST, threshold, over-under, VO2max, pyramidové intervaly, tempo, endurance Z2) — cílem je individualizované, ne šablonovité plánování.
3. Na co si dát pozor tento týden (únava, TSB, riziko přetrénování, kdy plán upravit)${updateFromDay?`
4. CO SE ZMĚNILO oproti původnímu plánu pro dny ${updateFromDay} až 7 a PROČ — konkrétně, s odkazem na to, co se reálně stalo/nestalo (splněné/nesplněné tréninky, skutečný výkon) nebo na změnu časové kapacity. Pokud se nic nemění, napiš to i tak ("plán pro zbytek týdne zůstává beze změny, protože...").`:""}

PŘED FINÁLNÍ ODPOVĚDÍ SI TICHO OVĚŘ (nedávej to do odpovědi, jen si to zkontroluj a případně oprav plán, než napíšeš JSON i text):
(a) Žádné dva po sobě jdoucí dny nejsou OBA intenzivní (SST/threshold/VO2max/tempo) — mezi dvěma takovými dny musí být den volno/regenerace nebo lehká Z2 jízda. Pokud je uveden PŘEDCHOZÍ TÝDEN v datech níže, počítej do této kontroly i návaznost — pokud poslední den předchozího týdne byl intenzivní a splněný, nový Den 1 nesmí být zase intenzivní.
(b) Sečti duration_min všech ${updateFromDay?`ZBÝVAJÍCÍCH (Den ${updateFromDay}-7)`:""} dnů s "type" JINÝM než "rest" a preveď na hodiny. Pokud součet nevychází v rozsahu ${(effWh*0.85).toFixed(1)}-${effWh}h, uprav plán: prodluž Z2/endurance jízdy nebo přidej další trénink, dokud součet do rozsahu nespadne. Pokud záměrně plánuješ méně (fyziologický důvod), musí to být výslovně zdůvodněno v bodě 3.
Teprve po této kontrole vypiš finální JSON a text.
Buď stručný a věcný, bez omáčky. Watty a délky nikam v textu nepiš — jsou jen v JSON.
Odpovídej v češtině.`;
  return prompt;
}

function buildAthleteContext(days=14){
  const recent=RIDES.slice(0,days);
  const totalTSS=recent.reduce((s,r)=>s+effectiveTss(r),0);
  const avgWatts=Math.round(recent.filter(r=>r.watts>0).reduce((s,r)=>s+r.watts,0)/Math.max(1,recent.filter(r=>r.watts>0).length));
  const avgHR=Math.round(recent.filter(r=>r.hr>0).reduce((s,r)=>s+r.hr,0)/Math.max(1,recent.filter(r=>r.hr>0).length));
  const totalHours=Math.round(recent.reduce((s,r)=>s+r.dur,0)/360)/10;
  const zwiftCount=recent.filter(r=>r.type==="VirtualRide").length;
  const outdoorCount=recent.filter(r=>r.type==="Ride").length;
  const today=new Date().toLocaleDateString("cs-CZ",{weekday:"long",day:"numeric",month:"long"});
  const curFtp=getCurrentFtp();
  return `Datum: ${today}
Sportovec: ${S.name}, ${S.weight}kg, FTP ${curFtp}W (${(curFtp/S.weight).toFixed(2)} W/kg)
Forma (CTL): ${LATEST.ctl} | Únava (ATL): ${LATEST.atl} | Svěžest (TSB): ${LATEST.tsb}
Tréninkový cíl: ${S.goal}
Zdravotní stav: ${S.notes||"bez omezení"}
Časová kapacita: max ${S.weeklyHours||8}h týdně na trénink celkem

Posledních ${days} jízd (TSS celkem: ${totalTSS}, ${totalHours}h, průměr ${avgWatts}W, průměr TF ${avgHR}bpm, Zwift: ${zwiftCount}x, venkovní: ${outdoorCount}x):
${recent.map(r=>`• ${r.date} [${r.type==="VirtualRide"?"Zwift":"Venkovní"}] ${r.name}: ${r.watts}W avg, TF ${r.hr}bpm, ${Math.round(r.dur/60)}min, ${r.km}km, TSS ${effectiveTss(r)}${r.prs>0?`, ${r.prs} PR`:""}`).join("\n")}`;
}
